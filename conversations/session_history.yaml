# Dinamik Semantik Konsept Haritası
semantic_state_map:
  interaction_language_policy:
    concept: "Oturum Etkileşim Dili"
    summary: "Tüm planlamalar, teknik analizler, ayarlamalar ve doğrudan iletişim süreçleri için Türkçe dil kullanımı kesinleştirilmiştir."
    last_updated_utc: "2026-05-24T21:49:50Z"
    status: "established"
    conflicts_detected: false

  conversation_logging_strategy:
    concept: "Konuşma Geçmişi Kayıt Politikası"
    summary: "Konuşmalar kronolojik düz log formatı yerine; aynı konu başlıklarını güncelleyen dinamik semantik harita ve minimum token tüketen makinece okunabilir YAML yapısında '/var/www/iotable/conversations/session_history.yaml' yolunda saklanmaktadır."
    last_updated_utc: "2026-05-24T22:00:39Z"
    status: "established"
    conflicts_detected: false

  session_constitution:
    concept: "Oturum Çalışma Anayasası"
    summary: |
      Oturumumuz boyunca işlerimizi hatasız, çelişkisiz ve verimli yürütmek için 6 temel anayasal kural belirlenmiştir:
      1. Dinamik Semantik Takip: Alınan tüm kararlar 'semantic_state_map' altında tekilleştirilir. Yeni karar eskisini günceller, asla çelişkili veya kopuk yeni kayıt atılmaz.
      2. Önce Planlama (Planning-First): 'specs/00_meta_policies.yaml' anayasa maddesi (Acele edilmeyecek, 10 adım sonrasını planlamadan harekete geçilmeyecek) uyarınca, her teknik adımdan önce bir plan hazırlanıp kullanıcı onayı alınacaktır.
      3. Makinece Okunabilirlik: Proje içi belgeler, spesifikasyonlar ve veri yapıları insan odaklı markdown yerine AI dostu yapılandırılmış formatlarda (YAML/JSON Schema) yazılacaktır.
      4. Önce Doğrulama (Validation-First): Her spec güncellemesinden sonra 'pnpm run validate' (tools/validate-specs.ts) çalıştırılarak sıfır hata ilkesi korunacaktır.
      5. Sürekli İndeksleme (Continuous Indexing): Yapılan güncellemelerin AI modelleri tarafından yüksek doğrulukla sorgulanabilmesi için projenin özgün indeksleme sistemi (tools/indexer) çalıştırılarak '.llm_index' altındaki semantik ilişkiler ve veri tabanı güncel tutulacaktır.
      6. Kritik Denetim (Critical Review): Agent, her emri mimari uyumluluk, verimlilik ve sürdürülebilirlik açısından sorgulamakla, daha iyi alternatifler sunmakla ve mükemmeliyetçi/gerçekçi bir süzgeçten geçirmekle yükümlüdür.
    last_updated_utc: "2026-05-24T22:04:25Z"
    status: "active"
    conflicts_detected: false

  indexing_strategy:
    concept: "Semantik İndeksleme Politikası"
    summary: "Projedeki 'tools/indexer' (embedding, graph, parser motorları) kullanılarak, güncellenen tüm spesifikasyonlar ve konuşma geçmişleri indekslenmekte, '.llm_index' altındaki AI-veri-motoruna aktarılmaktadır. Akıllı indeksleme (topology mapping) yaklaşımı kullanıcı tarafından onaylanmış ve oturum standartı haline getirilmiştir."
    last_updated_utc: "2026-05-24T22:00:39Z"
    status: "established"
    conflicts_detected: false

  development_philosophy:
    concept: "AI-First Geliştirme Paradigması"
    summary: |
      Bu depodaki (repository) temel tasarım felsefesi 'All Things for Only AI' (Her Şey Sadece AI İçin) esasına dayanır.
      - specs/, schemas/, tools/indexer/ ve conversations/ katmanları, kod yazımı öncesindeki tüm mimari kuralları ve durumları belirleyen AI-optimize bir kontrol düzlemidir.
      - src/ dizini ise bu kontrol düzleminin kurallarına %100 uymak zorunda olan, deterministik ve türetilmiş bir uygulama (downstream implementation) katmanıdır.
      - AI, specs katmanında mutabık kalınmayan hiçbir mantığı src/ altında üretemez veya değiştiremez.
    last_updated_utc: "2026-05-24T21:54:48Z"
    status: "active"
    conflicts_detected: false

  repository_product_baseline:
    concept: "Ürün Temeli ve Çoklu Kiracılık (Multi-Tenancy) Yapısı"
    summary: |
      - Ürün Kimliği: IoTable, cafe ve restaurant operasyonları için geliştirilen çoklu kiracılı (multi-tenant) bir platformdur.
      - Domain Mimarisi: Platform 'platform.iotables.net', kiracılar ise '{tenant}.iotables.net' kalıbı üzerinden sub-domain yönlendirmesiyle ayrışır.
      - Veri İzolasyon Modeli: 'database_per_tenant' modeli uygulanmaktadır. Platform verisi 'iotable_platform' veritabanında tutulurken, her kiracının verisi 'iotable_tenant_{tenantSlug}' adında bağımsız bir PostgreSQL veritabanında tutulur.
      - Yaşam Döngüsü: Kiracı statüleri sırasıyla: draft -> provisioning -> provisioning_failed -> pending_activation -> active -> suspended -> deactivated şeklindedir.
      - Veritabanı Değişim Yönetimi: Kiracı veritabanı şema güncellemeleri platform seviyesinde sıralı (sequential) olarak işletilir ve izole edilir.
    last_updated_utc: "2026-05-24T21:56:25Z"
    status: "injected"
    conflicts_detected: false

  system_scope_boundaries:
    concept: "Sistem Kapsamı ve Ödeme Sınırları"
    summary: |
      - Kimlik & Yetkilendirme: FastAPI Users & SQLAlchemy ile kimlik doğrulama, backend tarafında ise rol bazlı değil izin (permission) bazlı yetki kontrolü yapılır.
      - Temel Roller: platform_owner (platform düzeyinde) ve kiracı düzeyinde (tenant_owner, tenant_admin, tenant_manager, cashier, floor_staff, station_operator, accountant).
      - Ödeme ve Kasa Kapsamı (İlk Aşama): Sadece adisyon takibi (bill session) ve dışarıdan tahsil edilen ödemelerin manuel olarak sisteme işlenmesi (manual payment recording) desteklenir.
      - Kısıtlamalar (İlk Aşama): Parçalı ödeme (split bill / Alman usulü) desteklenmez. Çevrimiçi ödeme geçitleri, ÖKC/POS cihazı entegrasyonu, mali yazıcı entegrasyonu veya e-Adisyon süreçleri bu sürümün kapsamı dışındadır (Aşama 2 özellikleridir).
    last_updated_utc: "2026-05-24T21:56:25Z"
    status: "injected"
    conflicts_detected: false

  customer_session_and_devices:
    concept: "Müşteri Oturumları ve Masaüstü ESP32 Cihazları"
    summary: |
      - Masa QR Oturumu: Müşteriler masalardaki QR kodu okutarak aktif sipariş oturumu (customer ordering session) başlatır. QR kodları tek kullanımlık olup sistem tarafından üretilir ve tüketildikten sonra sunucu tarafından döndürülür (rotate).
      - Adisyon (Bill Session) Başlangıcı: Bir masa için adisyon oturumu, masadaki ilk başarılı sipariş gönderildiğinde otomatik olarak oluşturulur. Aynı masadaki diğer müşteriler de aynı adisyona sipariş ekleyebilir. Kapatma işlemi kasa görevlisi tarafından manuel ödeme kaydı ile yapılır.
      - Mutfak/Bar İstasyon Akışı: Gönderilen siparişler ilgili istasyonlara (station) yönlendirilir, istasyon sorumlusunun siparişi kabul etmesi (acknowledge) ve hazırlandı olarak işaretlemesi gerekir.
      - ESP32 Cihazları: Masalarda TFT ekranlı QR gösterici olarak yer alan ESP32 cihazları sadece sunucudan gelen QR kodunu gösterir, kendileri QR veya token üretemez.
    last_updated_utc: "2026-05-24T21:56:25Z"
    status: "injected"
    conflicts_detected: false

  repository_topology_and_indexes:
    concept: "Proje Topolojisi ve Dizin İlişkileri İndeksi"
    summary: |
      Reponun tüm AI-First kontrol düzlemi bileşenleri, dizin yapıları ve amaçları aşağıda indekslenmiştir:
      - specs/ (Spesifikasyon Belgeleri - YAML):
        1. 00_meta_policies.yaml: Meta politikalar, anayasa, LLM yürütme kuralları.
        2. 01_product_baseline.yaml: Ürün kapsamı, tenant modeli, roller, ödeme sınırları.
        3. 02_system_architecture.yaml: Teknoloji yığını, izolasyon kuralları, veri tabanı mimarisi.
        4. 03_domain_model.yaml: İstasyon yönlendirme, rol yetki matrisi, adisyon iş akışı.
        5. 04_application_contracts.yaml: Platform kontrol düzlemi, tenant konsolu, API sözleşmeleri.
        6. 05_testing_operations.yaml: Test taksonomisi, kabul kriterleri ve VPS sağlık kontrolü.
      - schemas/ (Doğrulama Şemaları - JSON Schema):
        Her .yaml spesifikasyon belgesini AJV ile doğrulamak için eşleşen JSON şemaları (00_meta_policies'den 05_testing_operations'a kadar 6 adet şema) bulunur.
      - tests/ (Otomatik Doğrulama Testleri):
        tests/backend/integration/test_db_routing.py dosyası ile kiracı veritabanı yönlendirmeleri test edilir.
      - tools/ (Geliştirici ve AI Araçları):
        1. validate-specs.ts: Şemalarla spesifikasyonların %100 eşleştiğini doğrular.
        2. indexer/: embedding_engine.py, graph_engine.py, llm_interface.py, parser_core.py, pipeline.py, query_engine.py dosyaları ile tüm belgeleri anlamsal grafikte indeksler.
      - .llm_index/ (AI İndeks Çıktıları - Binary/JSON):
        İndeksleyici tarafından derlenen codebase_map.json, specs_map.json ve specs_database.db (2.3 MB SQLite) dosyaları ile TF-IDF ve vektör verilerini saklar.
    last_updated_utc: "2026-05-24T21:58:58Z"
    status: "active"
    conflicts_detected: false

  agent_persona_and_critic_protocol:
    concept: "Kritik Denetim ve Sert Eleştirmen Modu"
    summary: "Agent, her emri mimari tutarlılık ve performans açısından acımasızca eleştirir. 'Şirinlik' yapmaz, körüöküne onaylamaz, hataları doğrudan yüze vurur ve gerçekçi/mükemmeliyetçi alternatifler üretir."
