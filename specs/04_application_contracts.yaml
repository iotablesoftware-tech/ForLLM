document:
  id: 04-application-contracts.application-contracts
  title: IoTable Application Contracts
  project: IoTable
  version: 1.0.0
  language: en
  format: yaml
  schema_required: true
  schema_file: schemas/04_application_contracts.schema.json
  status: draft
platform_audit_catalog:
  purpose:
    rule: Define platform-scoped audit policy, event catalog, required fields, exclusions,
      and retention behavior.
    audience:
    - platform_owner
    applies_to:
    - platform_control_plane
    - platform_api
    - tenant_lifecycle
    - tenant_provisioning
    - tenant_schema_jobs
    - platform_settings
    - platform_authentication
  platform_audit_policy:
    audit_read_only_views: false
    audit_state_changes: true
    audit_security_events: true
    audit_failed_mutations: true
    audit_system_job_failures: true
    audit_retention_days: 365
    rules:
    - Read-only page views MUST NOT create platform audit records.
    - State-changing platform actions MUST create platform audit records.
    - Security-relevant platform authentication events MUST create platform audit
      records.
    - Failed platform mutations MUST create platform audit records.
    - System job failures related to platform-owned tenant lifecycle, provisioning,
      or schema changes MUST create platform audit records.
    - Audit records MUST be append-only.
    - Audit records MUST NOT be edited after creation.
  platform_audit_record_contract:
    required_fields:
      id: uuid
      event_type: enum
      actor_type: platform_owner_or_system
      actor_id: nullable_uuid
      tenant_id: nullable_uuid
      job_id: nullable_uuid
      severity: info_warning_or_critical
      reason: nullable_string
      metadata: json_object
      created_at: timestamp
    rules:
    - actor_id MUST be present when actor_type is platform_owner.
    - actor_id MUST be null when actor_type is system.
    - tenant_id MUST be present for tenant-related platform audit events.
    - job_id MUST be present for job-related platform audit events.
    - reason MUST be present when the action requires a reason.
    - metadata MUST contain only structured machine-readable fields.
  event_catalog:
    tenant_lifecycle_events:
    - id: tenant_created
      actor_type: platform_owner
      severity: info
      required_fields:
      - tenant_id
      - actor_id
      - created_at
    - id: tenant_creation_failed
      actor_type: system
      severity: critical
      required_fields:
      - tenant_id
      - failure_message
      - created_at
    - id: tenant_suspended
      actor_type: platform_owner
      severity: warning
      required_fields:
      - tenant_id
      - actor_id
      - reason
      - created_at
    - id: tenant_reactivated
      actor_type: platform_owner
      severity: info
      required_fields:
      - tenant_id
      - actor_id
      - reason
      - created_at
    - id: tenant_deactivated
      actor_type: platform_owner
      severity: critical
      required_fields:
      - tenant_id
      - actor_id
      - reason
      - created_at
    activation_events:
    - id: tenant_owner_activation_invite_created
      actor_type: system
      severity: info
      required_fields:
      - tenant_id
      - created_at
    - id: tenant_owner_activation_invite_resent
      actor_type: platform_owner
      severity: info
      required_fields:
      - tenant_id
      - actor_id
      - reason
      - created_at
    provisioning_events:
    - id: tenant_provisioning_started
      actor_type: system
      severity: info
      required_fields:
      - tenant_id
      - job_id
      - created_at
    - id: tenant_provisioning_failed
      actor_type: system
      severity: critical
      required_fields:
      - tenant_id
      - job_id
      - failed_step
      - failure_message
      - created_at
    - id: tenant_provisioning_retry_requested
      actor_type: platform_owner
      severity: warning
      required_fields:
      - tenant_id
      - job_id
      - actor_id
      - failed_step
      - retry_attempt_number
      - reason
      - created_at
    - id: tenant_provisioning_retry_completed
      actor_type: system
      severity: info
      required_fields:
      - tenant_id
      - job_id
      - created_at
    schema_job_events:
    - id: tenant_schema_job_started
      actor_type: system
      severity: info
      required_fields:
      - tenant_id
      - job_id
      - created_at
    - id: tenant_schema_job_failed
      actor_type: system
      severity: critical
      required_fields:
      - tenant_id
      - job_id
      - failure_message
      - created_at
    - id: tenant_schema_job_completed
      actor_type: system
      severity: info
      required_fields:
      - tenant_id
      - job_id
      - created_at
    settings_events:
    - id: platform_setting_updated
      actor_type: platform_owner
      severity: warning
      required_fields:
      - actor_id
      - setting_id
      - old_value
      - new_value
      - created_at
    - id: platform_setting_update_rejected
      actor_type: system
      severity: warning
      required_fields:
      - setting_id
      - attempted_value
      - reason
      - created_at
    authentication_events:
    - id: platform_login_succeeded
      actor_type: platform_owner
      severity: info
      required_fields:
      - actor_id
      - created_at
    - id: platform_login_failed
      actor_type: system
      severity: warning
      required_fields:
      - attempted_identifier
      - failure_reason
      - created_at
  excluded_events:
  - id: dashboard_viewed
    reason: Read-only dashboard viewing does not change state and would create audit
      noise.
  - id: tenants_list_viewed
    reason: Read-only list viewing does not change state and would create audit noise.
  - id: tenant_detail_viewed
    reason: Read-only tenant inspection does not change state and would create audit
      noise.
  - id: health_page_viewed
    reason: Read-only health inspection does not change state and would create audit
      noise.
  - id: settings_page_viewed
    reason: Read-only settings inspection does not change state and would create audit
      noise.
  platform_audit_ui:
    route: /audit
    filters:
    - event_type
    - severity
    - actor_type
    - tenant_id
    - job_id
    - created_at_range
    default_sort: created_at_desc
    rules:
    - Audit UI MUST show event type, severity, actor, tenant, job, reason, and created_at
      when available.
    - Audit UI MUST show metadata as structured key-value details.
    - Audit UI MUST NOT allow editing or deleting audit records.
  forbidden_behavior:
  - auditing_read_only_page_views
  - editing_audit_records
  - deleting_audit_records_from_ui
  - free_text_only_metadata
  - missing_reason_for_reason_required_actions
  open_decisions: []
  done_when:
  - platform_audit_policy_is_defined
  - audit_record_contract_is_defined
  - tenant_lifecycle_audit_events_are_defined
  - activation_audit_events_are_defined
  - provisioning_audit_events_are_defined
  - schema_job_audit_events_are_defined
  - settings_audit_events_are_defined
  - authentication_audit_events_are_defined
  - excluded_audit_events_are_defined
  - audit_ui_behavior_is_defined
platform_control_plane:
  purpose:
    rule: Define the platform owner control plane surface used to manage tenant lifecycle,
      provisioning, schema jobs, audit, support, and system health.
    audience:
    - platform_owner
    scope_boundary:
      included:
      - tenant_lifecycle
      - tenant_creation
      - tenant_provisioning
      - tenant_schema_jobs
      - platform_audit
      - support_visibility
      - system_health
      - platform_settings
      excluded:
      - tenant_customer_operations
      - tenant_menu_management
      - tenant_order_operations
      - tenant_station_operations
      - tenant_checkout_operations
  route_map:
    base_domain: https://platform.iotables.net
    routes:
    - id: platform_dashboard
      path: /
      purpose: Show platform overview, tenant counts, provisioning health, job failures,
        and system health summary.
    - id: tenants_list
      path: /tenants
      purpose: List tenants and their lifecycle, domain, provisioning, and activation
        state.
    - id: tenant_create
      path: /tenants/new
      purpose: Create a new tenant with minimal manual input and strict system-generated
        infrastructure identifiers.
    - id: tenant_detail
      path: /tenants/{tenantId}
      purpose: Inspect tenant identity, lifecycle status, domain, owner activation
        state, and operational metadata.
    - id: tenant_provisioning
      path: /tenants/{tenantId}/provisioning
      purpose: Inspect tenant provisioning job state, steps, failures, retries, and
        activation invite state.
    - id: tenant_database
      path: /tenants/{tenantId}/database
      purpose: Inspect tenant database registry record, schema version, and schema
        job status.
    - id: tenant_users
      path: /tenants/{tenantId}/users
      purpose: Inspect tenant owner activation state and tenant user metadata visible
        to the platform owner.
    - id: jobs
      path: /jobs
      purpose: List platform provisioning and tenant schema change jobs.
    - id: job_detail
      path: /jobs/{jobId}
      purpose: Inspect one job, its steps, failure state, retry eligibility, and audit
        trail.
    - id: audit
      path: /audit
      purpose: Inspect platform-level audit records.
    - id: settings
      path: /settings
      purpose: Manage platform-level settings.
    - id: health
      path: /health
      purpose: Expose platform health status.
  surface_rules:
  - id: PCP-001
    rule: The platform control plane MUST NOT expose tenant operational workflows.
  - id: PCP-002
    rule: The platform control plane MUST NOT provide menu, order, station, checkout,
      or customer session management for a tenant.
  - id: PCP-003
    rule: The platform control plane MAY inspect tenant lifecycle, provisioning, schema,
      activation, audit, and health metadata.
  - id: PCP-004
    rule: The platform control plane MUST be served only from platform.iotables.net.
  - id: PCP-005
    rule: Platform routes MUST use platform API routes under /api/platform/**.
  dashboard_metrics:
    purpose: Show only operationally actionable platform state.
    forbidden_metric_types:
    - vanity_metric
    - decorative_chart
    - tenant_business_revenue
    - tenant_order_volume
    - tenant_customer_behavior
    cards:
    - id: total_tenants
      label: Total tenants
      source: tenant_registry
      action_target: /tenants
      severity: info
    - id: active_tenants
      label: Active tenants
      source: tenant_registry.status.active
      action_target: /tenants?status=active
      severity: info
    - id: pending_activation_tenants
      label: Pending activation
      source: tenant_registry.status.pending_activation
      action_target: /tenants?status=pending_activation
      severity: warning
    - id: suspended_tenants
      label: Suspended tenants
      source: tenant_registry.status.suspended
      action_target: /tenants?status=suspended
      severity: warning
    - id: failed_provisioning_jobs
      label: Failed provisioning jobs
      source: tenant_provisioning_jobs.status.failed
      action_target: /jobs?type=provisioning&status=failed
      severity: critical
    - id: running_provisioning_jobs
      label: Running provisioning jobs
      source: tenant_provisioning_jobs.status.running
      action_target: /jobs?type=provisioning&status=running
      severity: info
    - id: failed_schema_jobs
      label: Failed schema jobs
      source: tenant_schema_change_jobs.status.failed
      action_target: /jobs?type=schema_change&status=failed
      severity: critical
    - id: tenant_schema_drift
      label: Tenants not on latest schema
      source: tenant_database_registry.schema_version_not_latest
      action_target: /jobs?type=schema_change
      severity: warning
    - id: platform_health
      label: Platform health
      source: health.platform
      action_target: /health
      severity: critical_when_unhealthy
    - id: database_health
      label: Database health
      source: health.database
      action_target: /health
      severity: critical_when_unhealthy
    - id: background_job_health
      label: Background job health
      source: health.background_jobs
      action_target: /health
      severity: critical_when_unhealthy
    lists:
    - id: recent_failed_jobs
      label: Recent failed jobs
      max_items: 10
      source: jobs.status.failed.order_by_updated_desc
      action_target: /jobs/{jobId}
      empty_state: No failed jobs.
    - id: recent_platform_audit_events
      label: Recent platform audit events
      max_items: 10
      source: platform_audit_log.order_by_created_desc
      action_target: /audit
      empty_state: No platform audit events.
    - id: tenants_requiring_attention
      label: Tenants requiring attention
      max_items: 10
      source: tenant_registry.attention_required
      action_target: /tenants/{tenantId}
      empty_state: No tenants require attention.
    rules:
    - Dashboard metrics MUST be actionable.
    - Dashboard MUST NOT show tenant order volume, tenant revenue, customer behavior,
      or tenant operational analytics.
    - Every dashboard card MUST link to a concrete investigation or action route.
    - Critical states MUST be visually distinguishable from informational states.
    - Dashboard empty states MUST be explicit and non-alarming.
  tenant_detail_screen:
    purpose: Inspect one tenant's platform-owned lifecycle, provisioning, database,
      activation, jobs, audit, and health state without entering tenant operations.
    route: /tenants/{tenantId}
    tabs:
    - id: overview
      label: Overview
      purpose: Show tenant identity and current platform lifecycle state.
      fields:
      - tenant_id
      - tenant_display_name
      - tenant_slug
      - tenant_domain
      - tenant_status
      - business_type
      - default_locale
      - default_currency
      - timezone
      - created_at
      - created_by_platform_user_id
    - id: lifecycle
      label: Lifecycle
      purpose: Show lifecycle status and allowed platform lifecycle actions.
      actions:
      - suspend_tenant
      - reactivate_tenant
      - deactivate_tenant
      rules:
      - Lifecycle actions MUST require a reason.
      - Lifecycle actions MUST create platform audit records.
    - id: provisioning
      label: Provisioning
      purpose: Show tenant provisioning job, steps, failures, and retry eligibility.
      fields:
      - latest_provisioning_job_id
      - latest_provisioning_job_status
      - current_step
      - failed_step
      - failure_message
      - retry_eligible
      - last_retry_at
    - id: database
      label: Database
      purpose: Show tenant database registry and schema state.
      fields:
      - tenant_database_name
      - database_status
      - current_schema_version
      - latest_schema_version
      - schema_drift
      - last_schema_job_id
      - connection_health
    - id: owner_activation
      label: Owner activation
      purpose: Show tenant owner activation state.
      fields:
      - tenant_owner_full_name
      - tenant_owner_email
      - activation_status
      - activation_invite_expires_at
      - activated_at
      actions:
      - resend_activation_invite
    - id: jobs
      label: Jobs
      purpose: Show jobs scoped to this tenant.
      job_types:
      - provisioning
      - schema_change
      filters:
      - status
      - job_type
      - created_at
    - id: audit
      label: Audit
      purpose: Show platform audit events related to this tenant.
      event_scope: tenant_related_platform_audit_events
    - id: health
      label: Health
      purpose: Show tenant platform-level health signals.
      checks:
      - tenant_domain_reachable
      - tenant_database_reachable
      - tenant_api_ready
      - tenant_schema_current
    - id: danger_zone
      label: Danger zone
      purpose: Group critical lifecycle actions requiring explicit confirmation.
      actions:
      - suspend_tenant
      - deactivate_tenant
      rules:
      - Danger zone actions MUST require reason input.
      - Danger zone actions MUST require explicit confirmation.
      - Danger zone actions MUST create platform audit records.
    forbidden_content:
    - tenant_menu_management
    - tenant_order_management
    - tenant_station_operation
    - tenant_checkout_operation
    - tenant_customer_session_management
    rules:
    - Tenant detail MUST stay platform-scoped.
    - Tenant detail MUST NOT become a tenant operations dashboard.
    - Tenant detail tabs MUST be minimal and investigation-oriented.
    - Tenant detail actions MUST link to lifecycle, provisioning, schema, activation,
      jobs, audit, or health behavior only.
  platform_tenant_creation_input_policy:
    manual_input_level: minimal
    system_generation_level: strict
    tenant_slug: editable_before_creation_only
    database_name: system_generated_only
    domain: system_generated_only
    manual_inputs:
    - id: tenant_display_name
      required: true
      type: string
      example: Kahve Duragi Alsancak
      purpose: Human-readable tenant name.
    - id: tenant_slug
      required: false
      type: slug
      example: kahve-duragi-alsancak
      purpose: Tenant subdomain label. If omitted, the system proposes and generates
        it from tenant_display_name.
      edit_rule: May be edited only before tenant creation is confirmed.
    - id: tenant_owner_full_name
      required: true
      type: string
      purpose: Initial tenant owner full name.
    - id: tenant_owner_email
      required: true
      type: email
      purpose: Initial tenant owner activation and login email.
    - id: tenant_owner_phone
      required: false
      type: phone
      purpose: Optional tenant owner phone number.
    - id: business_type
      required: true
      type: enum
      allowed_values:
      - cafe
      - restaurant
      - fast_casual
      - food_court
      - bar_pub
      - other
      purpose: Tenant business category.
    - id: default_locale
      required: true
      type: locale
      default: tr-TR
      purpose: Default tenant locale.
    - id: default_currency
      required: true
      type: currency_code
      default: TRY
      purpose: Default tenant currency.
    - id: timezone
      required: true
      type: iana_timezone
      default: Europe/Istanbul
      purpose: Tenant default timezone.
    - id: initial_plan
      required: true
      type: enum
      default: standard
      allowed_values:
      - standard
      purpose: Initial platform plan assigned to the tenant.
    - id: notes
      required: false
      type: string
      purpose: Optional platform owner note.
    system_generated_values:
    - id: tenant_id
      generation: uuid
      editable_by_platform_owner: false
    - id: tenant_slug
      generation: normalized_unique_slug_from_display_name_when_not_manually_provided
      editable_by_platform_owner: before_creation_only
    - id: tenant_domain
      generation: '{tenantSlug}.iotables.net'
      editable_by_platform_owner: false
    - id: tenant_database_name
      generation: iotable_tenant_{tenantSlug}
      editable_by_platform_owner: false
    - id: tenant_status
      generation: draft_then_provisioning_then_pending_activation
      editable_by_platform_owner: false
    - id: provisioning_job_id
      generation: uuid
      editable_by_platform_owner: false
    - id: database_connection_metadata
      generation: system_generated
      editable_by_platform_owner: false
    - id: activation_invite_token
      generation: secure_random_token
      editable_by_platform_owner: false
    - id: tenant_owner_activation_url
      generation: system_generated_activation_url
      editable_by_platform_owner: false
    - id: created_at
      generation: system_time
      editable_by_platform_owner: false
    - id: created_by_platform_user_id
      generation: current_authenticated_platform_user
      editable_by_platform_owner: false
    - id: audit_record
      generation: tenant_created
      editable_by_platform_owner: false
  create_flow:
  - step: 1
    id: enter_tenant_identity
    actor: platform_owner
    result: Platform owner enters tenant display name and tenant owner information.
  - step: 2
    id: propose_slug
    actor: system
    result: System proposes a tenant slug from the tenant display name.
  - step: 3
    id: confirm_or_edit_slug
    actor: platform_owner
    result: Platform owner confirms or edits the proposed tenant slug before creation.
  - step: 4
    id: validate_slug
    actor: system
    result: System validates slug format and global uniqueness.
  - step: 5
    id: derive_domain_and_database_name
    actor: system
    result: System derives tenant domain and tenant database name.
  - step: 6
    id: confirm_creation
    actor: platform_owner
    result: Platform owner confirms tenant creation.
  - step: 7
    id: create_tenant_record
    actor: system
    result: System creates the tenant registry record.
  - step: 8
    id: start_provisioning_job
    actor: system
    result: System starts the tenant provisioning job.
  - step: 9
    id: create_tenant_database
    actor: system
    result: System creates the dedicated tenant database.
  - step: 10
    id: apply_schema_and_seed
    actor: system
    result: System applies the current tenant schema and required seed data.
  - step: 11
    id: create_owner_activation_invite
    actor: system
    result: System creates the tenant owner activation invite.
  - step: 12
    id: set_pending_activation
    actor: system
    result: Tenant status becomes pending_activation.
  validation_rules:
  - id: TCV-001
    rule: Tenant display name is required.
  - id: TCV-002
    rule: Tenant owner full name is required.
  - id: TCV-003
    rule: Tenant owner email is required and MUST be a valid email address.
  - id: TCV-004
    rule: Tenant slug MUST contain only lowercase ascii letters, digits, and hyphens.
  - id: TCV-005
    rule: Tenant slug MUST be globally unique.
  - id: TCV-006
    rule: Tenant slug MUST NOT be editable after tenant creation is confirmed.
  - id: TCV-007
    rule: Tenant domain MUST be derived from tenant slug.
  - id: TCV-008
    rule: Tenant database name MUST be derived from tenant slug.
  - id: TCV-009
    rule: Platform owner MUST NOT manually enter tenant database name.
  - id: TCV-010
    rule: Platform owner MUST NOT manually enter tenant id, provisioning job id, activation
      token, or connection metadata.
  - id: TCV-011
    rule: Default locale, currency, timezone, and initial plan MUST have explicit
      values at creation time.
  open_decisions: []
  done_when:
  - platform_scope_boundary_is_defined
  - platform_routes_are_defined
  - platform_dashboard_metrics_are_defined
  - tenant_detail_tabs_are_defined
  - tenant_detail_platform_scope_is_enforced
  - tenant_creation_manual_inputs_are_defined
  - tenant_creation_system_generated_values_are_defined
  - tenant_creation_flow_is_defined
  - tenant_creation_validation_rules_are_defined
  - open_platform_control_plane_decisions_are_recorded
platform_provisioning_retry:
  purpose:
    rule: Define platform owner behavior for failed tenant provisioning jobs and provisioning
      retry UI behavior.
    audience:
    - platform_owner
    applies_to:
    - platform_dashboard
    - tenant_detail.provisioning
    - jobs
    - job_detail
    - platform_audit
  provisioning_retry_policy:
    retry_model: manual_retry_from_failed_step
    automatic_retry: false
    retry_actor: platform_owner
    retry_requires_reason: true
    retry_creates_audit_record: true
    retry_starts_from: failed_step
    retry_preserves_completed_steps: true
    retry_limit: 3
    after_retry_limit: manual_intervention_required
    rules:
    - Provisioning retry MUST NOT be automatic.
    - Only platform_owner MAY retry a failed provisioning job.
    - Retry MUST start from the failed step.
    - Completed provisioning steps MUST NOT be re-executed.
    - Retry MUST require a platform_owner-provided reason.
    - Every retry attempt MUST create a platform audit record.
    - A provisioning job MUST allow at most 3 retry attempts.
    - After the retry limit is reached, the job MUST become manual_intervention_required.
  provisioning_steps:
  - id: create_tenant_record
    retryable: false
    reason: Tenant registry record is the initiating record and MUST NOT be duplicated.
  - id: reserve_tenant_domain
    retryable: true
    idempotency_required: true
  - id: create_tenant_database
    retryable: true
    idempotency_required: true
  - id: apply_tenant_schema
    retryable: true
    idempotency_required: true
  - id: seed_tenant_database
    retryable: true
    idempotency_required: true
  - id: create_owner_activation_invite
    retryable: true
    idempotency_required: true
  - id: set_pending_activation
    retryable: true
    idempotency_required: true
  job_status_model:
    statuses:
    - queued
    - running
    - failed
    - retrying
    - completed
    - manual_intervention_required
    terminal_statuses:
    - completed
    - manual_intervention_required
    retryable_statuses:
    - failed
    non_retryable_statuses:
    - queued
    - running
    - retrying
    - completed
    - manual_intervention_required
  platform_ui_behavior:
    dashboard:
      failed_provisioning_jobs_card:
        visible_when_count_greater_than_zero: true
        action_target: /jobs?type=provisioning&status=failed
        severity: critical
    tenant_detail_provisioning_tab:
      required_fields:
      - latest_provisioning_job_id
      - latest_provisioning_job_status
      - current_step
      - failed_step
      - failure_message
      - retry_attempt_count
      - retry_limit
      - retry_eligible
      - last_retry_at
      - manual_intervention_required
      retry_action:
        label: Retry from failed step
        visible_when: latest_provisioning_job_status_is_failed_and_retry_attempt_count_below_limit
        requires_reason: true
        confirmation_required: true
    job_detail_screen:
      required_sections:
      - job_summary
      - step_timeline
      - failure_details
      - retry_history
      - audit_trail
      retry_action:
        label: Retry from failed step
        requires_reason: true
        confirmation_required: true
  retry_execution_rules:
    atomicity:
      rule: Retry state transition MUST be atomic.
      required_transition: failed_to_retrying
    idempotency:
      rule: Every retryable provisioning step MUST be idempotent.
    concurrency:
      rules:
      - Only one retry attempt MAY run for the same provisioning job at a time.
      - Concurrent retry requests for the same job MUST be rejected.
    completed_step_handling:
      rule: The retry executor MUST skip completed steps and resume at the failed
        step.
    failure_handling:
      rules:
      - If retry fails, the job status MUST return to failed unless retry_limit is
        reached.
      - If retry_limit is reached, the job status MUST become manual_intervention_required.
  platform_audit_events:
  - id: tenant_provisioning_retry_requested
    actor: platform_owner
    required_fields:
    - tenant_id
    - job_id
    - failed_step
    - retry_attempt_number
    - reason
    - created_at
  - id: tenant_provisioning_retry_started
    actor: system
    required_fields:
    - tenant_id
    - job_id
    - start_step
    - created_at
  - id: tenant_provisioning_retry_completed
    actor: system
    required_fields:
    - tenant_id
    - job_id
    - created_at
  - id: tenant_provisioning_retry_failed
    actor: system
    required_fields:
    - tenant_id
    - job_id
    - failed_step
    - failure_message
    - created_at
  - id: tenant_provisioning_manual_intervention_required
    actor: system
    required_fields:
    - tenant_id
    - job_id
    - reason
    - created_at
  forbidden_behavior:
  - automatic_retry
  - retry_from_beginning_by_default
  - reexecuting_completed_steps
  - retry_without_reason
  - retry_without_audit
  - silent_retry
  open_decisions: []
  done_when:
  - manual_retry_from_failed_step_is_defined
  - automatic_retry_is_forbidden
  - retry_actor_is_defined
  - retry_reason_requirement_is_defined
  - retry_limit_is_defined
  - provisioning_steps_are_defined
  - job_status_model_is_defined
  - platform_ui_behavior_is_defined
  - retry_execution_rules_are_defined
  - platform_audit_events_are_defined
platform_settings_catalog:
  purpose:
    rule: Define the editable and read-only platform settings exposed in the platform
      control plane.
    audience:
    - platform_owner
    route: /settings
  settings_policy:
    mode: minimal_editable_settings
    rules:
    - Only operational defaults MAY be editable from platform settings.
    - System identity, tenancy patterns, architecture decisions, authentication stack,
      and QR security constants MUST be read-only.
    - Editable settings MUST have explicit validation rules.
    - Every settings change MUST create a platform audit record.
    - Settings MUST NOT change existing tenant infrastructure identifiers retroactively.
  editable_settings:
  - id: default_locale
    type: locale
    default: tr-TR
    validation: must_be_supported_locale
    applies_to: new_tenant_creation_default
    retroactive: false
  - id: default_currency
    type: currency_code
    default: TRY
    validation: must_be_supported_currency_code
    applies_to: new_tenant_creation_default
    retroactive: false
  - id: default_timezone
    type: iana_timezone
    default: Europe/Istanbul
    validation: must_be_valid_iana_timezone
    applies_to: new_tenant_creation_default
    retroactive: false
  - id: tenant_owner_activation_invite_ttl_hours
    type: integer
    default: 72
    minimum: 1
    maximum: 168
    validation: must_be_between_minimum_and_maximum
    applies_to: new_activation_invites
    retroactive: false
  - id: provisioning_retry_limit
    type: integer
    default: 3
    minimum: 0
    maximum: 10
    validation: must_be_between_minimum_and_maximum
    applies_to: new_or_failed_provisioning_jobs
    retroactive: false
  read_only_settings:
  - id: platform_domain
    value: platform.iotables.net
    reason: Platform domain is part of the deployment and route namespace contract.
  - id: tenant_domain_pattern
    value: '{tenant}.iotables.net'
    reason: Tenant domain pattern is part of the tenancy contract.
  - id: tenant_database_name_pattern
    value: iotable_tenant_{tenantSlug}
    reason: Tenant database naming is part of the tenant isolation contract.
  - id: platform_database_name
    value: iotable_platform
    reason: Platform database name is part of the deployment and data ownership contract.
  - id: qr_rotation_interval_seconds
    value: 60
    reason: QR rotation interval is part of the customer presence security model.
  - id: architecture_style
    value: modular_monolith
    reason: Architecture style is a specification decision, not a runtime setting.
  - id: auth_identity_store
    value: FastAPI Users & SQLAlchemy
    reason: Authentication stack is a system architecture decision.
  - id: auth_oidc_oauth_server
    value: OAuth2 Password Flow (JWT)
    reason: Authentication stack is a system architecture decision.
  - id: database_engine
    value: PostgreSQL 17
    reason: Database engine is a technology stack decision.
  settings_ui:
    sections:
    - id: tenant_defaults
      label: Tenant defaults
      editable_settings:
      - default_locale
      - default_currency
      - default_timezone
    - id: activation
      label: Activation
      editable_settings:
      - tenant_owner_activation_invite_ttl_hours
    - id: provisioning
      label: Provisioning
      editable_settings:
      - provisioning_retry_limit
    - id: system_contracts
      label: System contracts
      read_only_settings:
      - platform_domain
      - tenant_domain_pattern
      - tenant_database_name_pattern
      - platform_database_name
      - qr_rotation_interval_seconds
      - architecture_style
      - auth_identity_store
      - auth_oidc_oauth_server
      - database_engine
    rules:
    - Read-only settings MUST be visibly read-only in the UI.
    - Read-only settings MUST explain why they cannot be edited.
    - Editable setting changes MUST require explicit save action.
    - Editable setting changes MUST show validation errors before submission.
  platform_audit_events:
  - id: platform_setting_updated
    actor: platform_owner
    required_fields:
    - setting_id
    - old_value
    - new_value
    - created_at
  - id: platform_setting_update_rejected
    actor: system
    required_fields:
    - setting_id
    - attempted_value
    - reason
    - created_at
  forbidden_behavior:
  - editing_tenant_domain_pattern_from_ui
  - editing_tenant_database_name_pattern_from_ui
  - editing_platform_database_name_from_ui
  - editing_qr_rotation_interval_from_ui
  - editing_auth_stack_from_ui
  - retroactively_mutating_existing_tenant_identifiers
  open_decisions: []
  done_when:
  - settings_policy_is_defined
  - editable_settings_are_defined
  - read_only_settings_are_defined
  - settings_ui_sections_are_defined
  - settings_audit_events_are_defined
  - forbidden_settings_behavior_is_defined
tenant_setup_console:
  purpose:
    rule: Define the tenant setup console, guided setup flow, default tenant seed
      tables and station, menu setup, staff setup, table device setup, operation activation
      requirements, business profile defaults, operating defaults, and setup ownership
      rules.
    applies_to:
    - tenant_setup_console
    - tenant_owner_activation
    - tenant_initial_configuration
    - tenant_operations_activation
    - tenant_default_seed_data
  surface:
    id: tenant_setup_console
    frontend_app: tenant_web
    route_family: https://{tenant}.iotables.net/console/**
    api_family: https://{tenant}.iotables.net/api/internal/**
    allowed_roles:
    - tenant_owner
    - tenant_admin
    - tenant_manager
    required_permissions:
      view: tenant.setup.view
      complete: tenant.setup.complete
    rules:
    - Tenant setup console MUST be served only from the tenant domain.
    - Tenant setup console MUST NOT be served from platform.iotables.net.
    - Tenant setup console MUST use tenant internal APIs.
    - Tenant setup console MUST NOT use platform APIs.
    - Tenant setup console MUST require authenticated tenant staff access.
  tenant_setup_flow:
    style: guided_setup_wizard
    first_login_behavior: tenant_owner_is_directed_to_setup_wizard_after_activation
    operations_dashboard_available_before_activation: false
    resume_supported: true
    partial_save_supported: true
    rules:
    - Tenant owner activation MUST complete before tenant setup can be completed.
    - A tenant with incomplete setup MUST show the guided setup wizard to authorized
      setup users.
    - Setup progress MUST be persisted.
    - Setup wizard MUST be resumable.
    - Tenant operations MUST NOT be activated until required setup gates pass.
  business_profile_defaults:
    business_type_default: cafe
    default_currency: TRY
    default_timezone: Europe/Istanbul
    allowed_business_types:
    - cafe
    - restaurant
    - bar
    - food_court_vendor
    - cloud_kitchen
    - other
    required_fields:
    - business_display_name
    - business_type
    - default_currency
    - default_timezone
    optional_fields:
    - business_legal_name
    - phone
    - address
    - logo
    rules:
    - Business display name MUST be provided before operations activation.
    - Business type MUST use an allowed value.
    - Default currency MUST default to TRY.
    - Default timezone MUST default to Europe/Istanbul.
    - Business legal name MUST be optional.
    - Logo MUST be optional.
  operating_defaults:
    default_service_mode: dine_in
    allowed_service_modes:
    - dine_in
    default_tax_display_mode: tax_included
    allowed_tax_display_modes:
    - tax_included
    - tax_excluded
    opening_hours_required: false
    service_charge_required: false
    fiscal_meaning: false
    rules:
    - Initial product version MUST support dine_in as the only service mode.
    - Delivery, pickup, takeaway, and room-service service modes MUST NOT be enabled
      in the initial product version.
    - Default tax display mode MUST be tax_included.
    - Tax display mode controls price presentation only.
    - Tax display mode MUST NOT imply fiscal device, e-invoice, e-archive, tax filing,
      or payment collection support.
    - Opening hours MUST be optional.
    - Service charge MUST be optional.
  table_model:
    canonical_identifier: table_id
    tenant_visible_identifier: table_number
    table_code: tenant_visible_unique_code
    allowed_types:
    - operational
    - system_test
    allowed_statuses:
    - active
    - disabled
    create_fields:
      required:
      - table_number
      - has_qr_device
      optional:
      - display_name
      - area_or_section
      - seat_capacity
    rules:
    - table_id MUST be system-generated and used as the canonical technical identifier.
    - table_number MUST be unique within a tenant.
    - table_number MUST be visible to tenant staff and customers.
    - Operational customer tables MUST use type operational.
    - Default test tables 000 and 999 MUST use type system_test.
    - Disabled tables MUST NOT accept new customer ordering sessions.
    - Table creation MUST explicitly capture whether the table has an ESP32 QR display
      device.
  station_model:
    canonical_identifier: station_id
    tenant_visible_identifier: station_code
    allowed_station_types:
    - kitchen
    - bar
    - coffee
    - dessert
    - service
    - other
    allowed_statuses:
    - active
    - disabled
    create_fields:
      required:
      - station_code
      - display_name
      - station_type
      optional:
      - sort_order
    rules:
    - station_id MUST be system-generated and used as the canonical technical identifier.
    - station_code MUST be unique within a tenant.
    - display_name MUST be provided for every station.
    - station_type MUST use an allowed value.
    - Disabled stations MUST NOT receive new station tickets.
  default_seed_station:
    created_for_every_tenant: true
    source: tenant_provisioning_seed
    station_code: MAIN
    display_name: Main Station
    station_type: kitchen
    status: active
    can_be_renamed: true
    can_be_disabled_after_another_active_station_exists: true
    rules:
    - Every tenant MUST receive an active MAIN station during tenant provisioning.
    - MAIN station MUST be usable for initial menu item routing.
    - MAIN station MUST count toward the required minimum active station activation
      gate.
    - Tenant users MAY rename MAIN station.
    - Tenant users MAY disable MAIN station only when at least one other active station
      exists.
  menu_category_model:
    canonical_identifier: category_id
    create_fields:
      required:
      - name
      optional:
      - description
      - sort_order
    allowed_statuses:
    - active
    - disabled
    rules:
    - category_id MUST be system-generated and used as the canonical technical identifier.
    - Category name MUST be provided.
    - Disabled categories MUST NOT appear in the customer menu.
    - Menu items under a disabled category MUST NOT appear in the customer menu.
  menu_item_model:
    canonical_identifier: item_id
    create_fields:
      required:
      - category_id
      - name
      - image
      optional:
      - description
      - sort_order
    orderable_item_required_fields:
    - price
    - station_id
    - image
    allowed_statuses:
    - active
    - disabled
    orderable_flag: true
    non_orderable_visible_items:
      allowed: true
      customer_menu_visibility: true
      add_to_cart_allowed: false
      display_badges:
      - unavailable
      - coming_soon
    price:
      currency: TRY
      type: decimal
    unsupported_in_initial_version:
    - variants
    - modifiers
    - option_groups
    - portion_sizes
    - extra_ingredients
    - stock_tracking
    rules:
    - item_id MUST be system-generated and used as the canonical technical identifier.
    - Menu item name MUST be provided.
    - Menu item image MUST be provided.
    - Orderable menu item price MUST be provided.
    - Orderable menu item station routing MUST be provided.
    - Orderable menu item image MUST be provided.
    - Disabled menu items MUST NOT appear in the customer menu.
    - Active non-orderable menu items MAY appear in the customer menu but MUST NOT
      be addable to cart.
    - Menu item price MUST be stored as TRY decimal in the initial product version.
    - Variants, modifiers, option groups, portion sizes, extra ingredients, and stock
      tracking MUST NOT be supported in the initial product version.
  station_routing_policy:
    routing_level: menu_item
    one_orderable_item_routes_to: one_station
    station_required_when_orderable: true
    rules:
    - Every orderable menu item MUST route to exactly one active station.
    - A menu item routed to a disabled station MUST NOT be orderable.
    - Station routing MUST be validated before operations activation.
    - Station routing MUST be revalidated before order submission.
  staff_setup:
    required_for_operations_activation: false
    setup_step_can_be_skipped: true
    ui_model: preset_driven_invitation_form
    invitation_fields:
      required:
      - display_name
      - email
      - role
      optional:
      - phone
      - station_assignment
    role_selection:
      control: dropdown
      source: fixed_tenant_role_catalog
      allowed_roles:
      - tenant_admin
      - tenant_manager
      - cashier
      - floor_staff
      - station_operator
      - accountant
    common_staff_presets:
    - id: manager
      label: Manager
      default_role: tenant_manager
    - id: cashier
      label: Cashier
      default_role: cashier
    - id: floor_staff
      label: Floor Staff
      default_role: floor_staff
    - id: station_operator
      label: Station Operator
      default_role: station_operator
      station_assignment_recommended: true
    - id: accountant
      label: Accountant
      default_role: accountant
    quick_add_behavior:
      allow_multiple_rows: true
      allow_preset_selection: true
      allow_role_dropdown_change: true
      send_invites_after_save: true
      allow_skip_step: true
    rules:
    - Staff setup MUST remain optional for operations activation.
    - Tenant setup console MUST provide preset-driven staff invitation.
    - Role selection MUST use fixed tenant role dropdown values.
    - Tenant owner role MUST NOT be assignable from the staff setup quick-add form.
    - Platform roles MUST NOT be assignable from tenant staff setup.
    - Station assignment MAY be recommended for station_operator invites.
    - Staff invitation MUST respect tenant.staff.invite and tenant.staff.assign_roles
      permissions.
  device_setup:
    required_for_operations_activation: false
    setup_step_can_be_skipped: true
    primary_model: table_specific_firmware_generation
    canonical_specification: specs/04_application_contracts.yaml
    table_creation_behavior:
      field: has_qr_device
      if_true:
      - system_generates_device_id
      - system_generates_device_secret
      - system_generates_ws_identity
      - system_generates_table_device_config
      - system_generates_table_specific_firmware_ino
      if_false:
      - no_esp32_device_identity_required
      - customer_self_ordering_via_table_qr_disabled
      - staff_pda_ordering_enabled
    firmware_download:
      artifact_is_secret: true
      allowed_roles:
      - tenant_owner
      - tenant_admin
      audit_required: true
    firmware_regeneration:
      allowed: true
      effect:
      - old_device_secret_revoked
      - new_device_secret_generated
      - new_table_specific_firmware_generated
    rules:
    - Device setup MUST be optional for operations activation.
    - Tenant setup console MUST allow creating tables with or without ESP32 QR display
      device support.
    - When has_qr_device=true, system MUST generate table-specific firmware.
    - When has_qr_device=false, table MUST support staff PDA ordering only and MUST
      NOT support customer self-ordering through table QR.
    - Firmware artifact MUST be treated as a secret.
    - Firmware download MUST be limited to tenant_owner and tenant_admin.
    - Firmware regeneration MUST revoke the old device secret.
    - Pairing-code-based setup MUST NOT be the primary device setup model in the initial
      product version.
  setup_steps:
  - id: business_profile
    required: true
    purpose: Capture tenant public and operational business identity.
    required_fields:
    - business_display_name
    - business_type
    - default_currency
    - default_timezone
    optional_fields:
    - business_legal_name
    - phone
    - address
    - logo
    defaults:
      business_type: cafe
      default_currency: TRY
      default_timezone: Europe/Istanbul
  - id: operating_defaults
    required: true
    purpose: Define baseline operational defaults.
    required_fields:
    - default_service_mode
    - default_tax_display_mode
    optional_fields:
    - opening_hours
    - service_charge
    defaults:
      default_service_mode: dine_in
      default_tax_display_mode: tax_included
  - id: tables
    required: true
    purpose: Define customer-facing operational tables and optionally generate table-specific
      ESP32 firmware.
    required_minimums:
      active_operational_tables: 1
    seeded_defaults:
    - '000'
    - '999'
    rules:
    - Tenant MUST create at least one operational table besides default test tables.
    - table_number MUST be unique within the tenant.
    - Table creation MUST capture has_qr_device.
    - When has_qr_device=true, table-specific firmware MUST be generated.
  - id: stations
    required: true
    purpose: Define fulfillment stations.
    required_minimums:
      active_stations: 1
    seeded_defaults:
    - MAIN
    rules:
    - Default MAIN station MUST be available before menu item creation.
    - Tenant MAY add additional stations.
  - id: menu_categories
    required: true
    purpose: Define menu grouping.
    required_minimums:
      active_menu_categories: 1
    rules:
    - Tenant MUST create at least one active menu category before operations activation.
  - id: menu_items
    required: true
    purpose: Define orderable products and station routing.
    required_minimums:
      active_orderable_menu_items: 1
    rules:
    - Every orderable menu item MUST have a price.
    - Every orderable menu item MUST have an image.
    - Every orderable menu item MUST have station routing.
    - Variants and modifiers MUST NOT be configured in the initial product version.
  - id: staff_users
    required: false
    purpose: Optionally invite tenant staff users using common presets and fixed role
      dropdowns.
    rules:
    - Staff setup MUST be skippable.
    - Common staff presets MUST be available.
    - Role selection MUST be dropdown-based and limited to fixed tenant roles.
  - id: devices
    required: false
    purpose: Review table QR device status and download or regenerate table-specific
      ESP32 firmware.
    rules:
    - ESP32 device setup MUST NOT be required for tenant operations activation.
    - Device setup MUST use table-specific firmware generation as the primary model.
    - Device firmware MAY be downloaded after operations activation by authorized
      roles.
  - id: review_and_activate_operations
    required: true
    purpose: Validate setup gates and activate tenant operations.
  default_seed_tables:
    created_for_every_tenant: true
    source: tenant_provisioning_seed
    tables:
    - table_number: '000'
      table_code: '000'
      name: Test Table 000
      type: system_test
      operational_use: false
      customer_production_use_allowed: false
      has_qr_device: false
      purpose:
      - internal_testing
      - review
      - showcase
      - user_acceptance_testing
      rules:
      - Table 000 MUST be created automatically for every tenant.
      - Table 000 MUST be clearly marked as a non-production test table.
      - Table 000 MUST NOT count toward the required minimum active operational table
        gate.
    - table_number: '999'
      table_code: '999'
      name: Test Table 999
      type: system_test
      operational_use: false
      customer_production_use_allowed: false
      has_qr_device: false
      purpose:
      - internal_testing
      - review
      - showcase
      - user_acceptance_testing
      rules:
      - Table 999 MUST be created automatically for every tenant.
      - Table 999 MUST be clearly marked as a non-production test table.
      - Table 999 MUST NOT count toward the required minimum active operational table
        gate.
    global_rules:
    - Every tenant MUST receive table 000 and table 999 during tenant provisioning.
    - Default test tables MUST be usable for test, review, showcase, and user acceptance
      testing flows.
    - Default test tables MUST be visually distinguishable from production operational
      tables in tenant UI.
    - Default test tables MUST NOT satisfy the minimum operational table requirement.
    - Default test tables MUST NOT be deleted by tenant users.
    - Default test tables MAY be disabled for customer-facing production routes only
      if testing routes remain available to authorized tenant users.
    - Default test tables MUST be created without ESP32 QR display devices by default.
  operations_activation_gates:
    required_before_activation:
    - business_profile_completed
    - operating_defaults_completed
    - at_least_one_active_operational_table_created
    - at_least_one_active_station_created
    - at_least_one_active_menu_category_created
    - at_least_one_active_orderable_menu_item_created
    - every_orderable_menu_item_has_price
    - every_orderable_menu_item_has_image
    - every_orderable_menu_item_has_station_routing
    - tenant_owner_activation_completed
    optional_before_activation:
    - staff_users_invited
    - esp32_table_firmware_downloaded
    - opening_hours_configured
    - service_charge_configured
    rules:
    - Default test tables 000 and 999 MUST NOT count as active operational tables
      for activation gates.
    - Default MAIN station MUST count as an active station for activation gates.
    - Staff users MUST NOT be required for operations activation.
    - ESP32 firmware download or device flashing MUST NOT be required for operations
      activation.
    - Operations activation MUST fail when there is no active operational table besides
      default test tables.
    - Operations activation MUST fail when no active station exists.
    - Operations activation MUST fail when no active orderable menu item exists.
    - Operations activation MUST fail when any orderable menu item lacks price.
    - Operations activation MUST fail when any orderable menu item lacks image.
    - Operations activation MUST fail when any orderable menu item lacks station routing.
  post_activation_behavior:
    tenant_operations_status: active
    setup_wizard_access_after_activation: available_as_setup_console
    dashboard_access_after_activation: true
    rules:
    - After operations activation, authorized users MAY revisit setup sections from
      tenant console.
    - Changes after activation MUST respect tenant permissions.
    - Operations activation MUST be auditable.
  forbidden_behavior:
  - tenant_operations_activation_without_business_profile
  - tenant_operations_activation_without_operational_table
  - tenant_operations_activation_counting_table_000_as_operational_table
  - tenant_operations_activation_counting_table_999_as_operational_table
  - tenant_operations_activation_without_station
  - tenant_operations_activation_without_orderable_menu_item
  - tenant_operations_activation_with_orderable_menu_item_without_price
  - tenant_operations_activation_with_orderable_menu_item_without_image
  - tenant_operations_activation_with_unrouted_orderable_menu_item
  - tenant_setup_console_using_platform_api
  - tenant_deleting_default_test_table_000
  - tenant_deleting_default_test_table_999
  - esp32_device_firmware_download_required_for_activation
  - pairing_code_primary_device_setup_in_initial_version
  - firmware_download_by_unauthorized_role
  - firmware_regeneration_without_old_secret_revocation
  - table_without_qr_device_accepting_customer_self_ordering_via_table_qr
  - tenant_initial_service_mode_delivery
  - tenant_initial_service_mode_pickup
  - tenant_initial_service_mode_takeaway
  - tax_display_mode_implying_fiscal_support
  - tenant_disabling_MAIN_station_without_another_active_station
  - duplicate_table_number_within_tenant
  - duplicate_station_code_within_tenant
  - menu_item_variants_in_initial_version
  - menu_item_modifiers_in_initial_version
  - menu_item_stock_tracking_in_initial_version
  - staff_users_required_for_operations_activation
  - tenant_owner_role_assigned_from_staff_quick_add
  - platform_role_assigned_from_tenant_staff_setup
  open_decisions: []
  done_when:
  - tenant_setup_surface_is_defined
  - guided_setup_flow_is_defined
  - business_profile_defaults_are_defined
  - operating_defaults_are_defined
  - table_model_is_defined
  - station_model_is_defined
  - default_seed_station_is_defined
  - menu_category_model_is_defined
  - menu_item_model_is_defined
  - station_routing_policy_is_defined
  - staff_setup_is_defined
  - device_setup_is_defined
  - setup_steps_are_defined
  - default_seed_tables_are_defined
  - operations_activation_gates_are_defined
  - post_activation_behavior_is_defined
  - forbidden_setup_behavior_is_defined
bill_session_api:
  purpose:
    rule: Define customer and staff bill/adisyon API contracts for bill view, staff
      bill list/detail, manual payment recording, bill close, and bill reopen.
    applies_to:
    - customer_bill_view
    - staff_bill_view
    - cashier_workspace
    - manual_payments
    - bill_close
    - bill_reopen
    - tenant_internal_api
  api_policy:
    tenant_domain_only: true
    platform_domain_allowed: false
    tenant_resolution: subdomain
    database_context: resolved_tenant_database_only
    payment_provider_processing: false
    rules:
    - Bill session APIs MUST be served only from tenant domains.
    - Bill session APIs MUST NOT be served from platform.iotables.net.
    - Bill session APIs MUST resolve exactly one tenant database from the request
      subdomain.
    - Bill session APIs MUST NOT query or mutate another tenant database.
    - Bill session APIs MUST NOT process provider payments in the initial product
      version.
    - Manual payment APIs MUST record external/offline payment events only.
  route_families:
    customer_bill: https://{tenant}.iotables.net/api/customer/bill/**
    staff_bill: https://{tenant}.iotables.net/api/internal/bills/**
    rules:
    - Customer bill endpoints MUST be scoped by active customer session and table.
    - Staff bill endpoints MUST be authenticated tenant staff endpoints.
    - Staff bill endpoints MUST enforce permissions.
  common_contract_rules:
    id_format: uuid
    timestamp_format: iso_8601_utc
    request_body_format: json
    response_body_format: json
    error_format: problem_details
    idempotency:
      required_for:
      - manual_payment_record
      - bill_close
      - bill_reopen
    rules:
    - Validation errors MUST use ProblemDetails.
    - State-changing bill endpoints MUST require idempotency keys.
    - Client-provided bill totals MUST NOT be trusted.
    - Bill totals MUST be recalculated server-side from attached order item snapshots.
  common_error_contract:
    format: problem_details
    content_type: application/problem+json
    fields:
    - type
    - title
    - status
    - detail
    - instance
    - correlationId
    - errors
    rules:
    - Every bill session API error response with a JSON body MUST use application/problem+json.
    - Validation failures MUST return 400 with field-level errors.
    - Authentication failures MUST return 401.
    - Authorization failures MUST return 403.
    - Missing resources MUST return 404.
    - Bill state conflicts and idempotency conflicts MUST return 409.
    - Unexpected failures MUST return 500 with correlationId.
  endpoints:
    customer_bill:
    - id: BSA-001
      method: GET
      path: /api/customer/bill/current
      authentication_required: true
      active_customer_session_required: true
      purpose: Return current bill/adisyon summary for the active customer session
        table.
      response: CustomerBillResponse
      rules:
      - Customer bill current MUST require active customer session.
      - Customer bill current MUST be unavailable from stale QR.
      - Customer bill current MUST only return bill data for the current session table.
      - Customer bill current MUST NOT reveal bills from another table.
      - After order submit, the customer session is offline and this endpoint requires
        a new fresh QR session.
    staff_bill:
    - id: BSA-100
      method: GET
      path: /api/internal/bills
      authentication_required: true
      required_permission: tenant.bills.view
      purpose: List bill sessions for staff/cashier views.
      query_parameters:
      - status
      - tableId
      - openedFrom
      - openedTo
      - page
      - pageSize
      response: PaginatedBillSessionSummaryResponse
      rules:
      - List bills MUST be permission protected.
      - List bills MUST use pagination.
    - id: BSA-101
      method: GET
      path: /api/internal/bills/{billSessionId}
      authentication_required: true
      required_permission: tenant.bills.view
      purpose: Return bill session detail including attached orders, order items,
        station status summary, and manual payments.
      response: BillSessionDetailResponse
      rules:
      - Bill detail MUST be permission protected.
      - Bill detail MUST return only data from the resolved tenant database.
    - id: BSA-102
      method: POST
      path: /api/internal/bills/{billSessionId}/manual-payments
      authentication_required: true
      required_permission: tenant.manual_payments.record
      purpose: Record an external/offline manual payment for a bill session.
      request: RecordManualPaymentRequest
      response: ManualPaymentResponse
      idempotency_required: true
      rules:
      - Manual payment MUST be permission protected.
      - Manual payment MUST NOT process provider payment charges.
      - Manual payment amount MUST be positive.
      - Initial product version MUST reject partial payments and overpayments.
      - Manual payment MUST be audited.
    - id: BSA-103
      method: POST
      path: /api/internal/bills/{billSessionId}/close
      authentication_required: true
      required_permissions:
      - tenant.bills.close
      - tenant.manual_payments.record
      purpose: Record required manual payment if provided and close a bill session
        atomically.
      request: CloseBillSessionRequest
      response: BillSessionDetailResponse
      idempotency_required: true
      rules:
      - Bill close MUST be permission protected.
      - Bill close MUST re-read and recalculate bill total server-side inside the
        transaction.
      - Bill close MUST require exactly matching manual payment total in the initial
        product version.
      - Bill close MUST reject client-provided bill totals as source of truth.
      - Bill close MUST set bill session status to closed atomically with manual payment
        record creation or validation.
      - Bill close MUST be audited.
    - id: BSA-104
      method: POST
      path: /api/internal/bills/{billSessionId}/reopen
      authentication_required: true
      required_permission: tenant.bills.reopen
      purpose: Reopen a closed bill session when no other active bill exists for the
        table.
      request: ReopenBillSessionRequest
      response: BillSessionDetailResponse
      idempotency_required: true
      rules:
      - Bill reopen MUST be permission protected.
      - Bill reopen MUST require reason.
      - Bill reopen MUST be limited to tenant_owner, tenant_admin, or tenant_manager
        through permission bundles.
      - Bill reopen MUST fail if another active bill exists for the same table.
      - Bill reopen MUST create bill_reopen_events record.
      - Bill reopen MUST be audited.
  request_response_contracts:
    CustomerBillResponse:
      fields:
      - bill_session_id
      - table_id
      - status
      - orders
      - items
      - subtotal_amount
      - discount_amount
      - service_charge_amount
      - tax_amount
      - total_amount
      - currency
      - server_time_utc
      forbidden_fields:
      - other_table_bills
      - staff_notes
      - manual_payment_internal_notes
    PaginatedBillSessionSummaryResponse:
      fields:
      - items
      - page
      - pageSize
      - totalItems
      - totalPages
    BillSessionDetailResponse:
      fields:
      - bill_session
      - table
      - attached_orders
      - order_items
      - station_status_summary
      - manual_payments
      - reopen_events
      - totals
      rules:
      - Totals MUST be server-calculated.
    RecordManualPaymentRequest:
      required:
      - amount
      - currency
      - payment_method
      optional:
      - external_reference
      - note
      allowed_payment_methods:
      - cash
      - card_external_pos
      - bank_transfer
      - other
      rules:
      - amount MUST be positive.
      - currency MUST match bill currency.
      - Request MUST NOT include payment provider charge data.
    ManualPaymentResponse:
      fields:
      - manual_payment_id
      - bill_session_id
      - amount
      - currency
      - payment_method
      - status
      - recorded_at_utc
    CloseBillSessionRequest:
      optional:
      - manual_payment
      - reason
      rules:
      - If manual_payment is provided, it MUST follow RecordManualPaymentRequest rules.
      - If an existing matching manual payment exists, close MAY use it.
      - Client-provided bill total MUST NOT be accepted.
    ReopenBillSessionRequest:
      required:
      - reason
      rules:
      - reason MUST be non-empty.
  security_and_audit:
    audit_required_for:
    - manual_payment_recorded
    - bill_close_started
    - bill_closed
    - bill_reopened
    security_rules:
    - Customer bill view MUST be scoped to active customer session table.
    - Staff bill APIs MUST be permission protected.
    - Manual payment records MUST not imply IoTable processed payment provider charges.
    - Client totals MUST never be trusted.
    - Bill close and reopen MUST be idempotent and audited.
  forbidden_behavior:
  - bill_session_api_on_platform_domain
  - bill_session_api_cross_tenant_query
  - customer_bill_view_from_stale_qr
  - customer_bill_view_for_other_table
  - staff_bill_view_without_permission
  - manual_payment_without_permission
  - manual_payment_provider_charge_initial_version
  - bill_close_without_permission
  - bill_close_trusting_client_total
  - bill_close_without_matching_manual_payment_initial_version
  - partial_payment_initial_version
  - overpayment_initial_version
  - bill_reopen_without_permission
  - bill_reopen_without_reason
  - bill_reopen_when_another_active_bill_exists
  open_decisions: []
  done_when:
  - bill_session_api_policy_is_defined
  - route_families_are_defined
  - common_contract_rules_are_defined
  - customer_bill_endpoint_is_defined
  - staff_bill_list_endpoint_is_defined
  - staff_bill_detail_endpoint_is_defined
  - manual_payment_endpoint_is_defined
  - bill_close_endpoint_is_defined
  - bill_reopen_endpoint_is_defined
  - request_response_contracts_are_defined
  - security_and_audit_rules_are_defined
  - forbidden_bill_session_api_behavior_is_defined
customer_order_api:
  purpose:
    rule: Define customer-facing tenant API contracts for public menu access, fresh
      QR session join, customer session extension, bill view, cart read/mutation,
      and order submission.
    applies_to:
    - customer_menu_routes
    - customer_qr_access
    - customer_sessions
    - customer_cart
    - customer_order_submit
    - bill_view
    - tenant_customer_api
  api_policy:
    route_root: https://{tenant}.iotables.net/api/customer
    tenant_domain_only: true
    platform_domain_allowed: false
    tenant_resolution: subdomain
    database_context: resolved_tenant_database_only
    customer_login_required: false
    customer_phone_required: false
    session_transport: http_only_secure_cookie
    post_submit_customer_order_status_endpoint: false
    rules:
    - Customer order API MUST be served only from tenant domains.
    - Customer order API MUST NOT be served from platform.iotables.net.
    - Customer order API MUST resolve exactly one tenant database from the request
      subdomain.
    - Customer order API MUST NOT query or mutate another tenant database.
    - Customer ordering MUST NOT require customer login in the initial product version.
    - Customer ordering MUST NOT require phone number in the initial product version.
    - Customer session token MUST be transported using HttpOnly Secure cookie.
    - Customer session token MUST NOT be stored in localStorage.
    - Initial product version MUST NOT expose customer order status lookup after submit,
      because successful submit moves the customer session offline.
  access_policy:
    stale_qr_allowed_for:
    - public_menu
    fresh_qr_required_for:
    - session_join
    active_customer_session_required_for:
    - session_current
    - session_extend
    - bill_view
    - cart_read
    - cart_mutation
    - order_submit
    post_submit_access:
      session_status: offline
      customer_order_status_lookup_allowed: false
      bill_or_adisyon_reaccess_requires_new_fresh_qr: true
    rules:
    - Public menu endpoint MUST allow stale QR access.
    - Public menu endpoint MUST NOT reveal active bill/adisyon state.
    - Public menu endpoint MUST NOT reveal cart or session state.
    - Session join endpoint MUST require fresh QR token.
    - Bill view, cart read, cart mutation, and order submit MUST require active customer
      session.
    - After successful order submit, the customer session MUST be offline and customer
      API order status lookup MUST NOT be available.
    - Viewing bill/adisyon after submit MUST require joining again with a fresh QR.
  common_contract_rules:
    id_format: uuid
    timestamp_format: iso_8601_utc
    request_body_format: json
    response_body_format: json
    error_format: problem_details
    idempotency:
      required_for:
      - session_join
      - session_extend
      - cart_item_add
      - cart_item_update
      - cart_item_delete
      - order_submit
    rules:
    - Validation errors MUST use ProblemDetails.
    - Mutation endpoints MUST support idempotency where listed.
    - Order submit MUST be idempotent.
    - Cart mutations MUST be idempotent to avoid duplicate items from network retries.
    - Customer session cookies MUST use HttpOnly, Secure, and SameSite=Lax or stricter.
  common_error_contract:
    format: problem_details
    content_type: application/problem+json
    fields:
    - type
    - title
    - status
    - detail
    - instance
    - correlationId
    - errors
    rules:
    - Every customer order API error response with a JSON body MUST use application/problem+json.
    - Validation failures MUST return 400 with field-level errors.
    - Missing or expired customer session failures MUST return 401.
    - Forbidden customer access failures MUST return 403.
    - Missing resources MUST return 404.
    - Stale or consumed QR token failures MUST return 409.
    - State conflicts and idempotency conflicts MUST return 409.
    - Unexpected failures MUST return 500 with correlationId.
  endpoints:
    public_menu:
    - id: COA-001
      method: GET
      path: /menu
      authentication_required: false
      stale_qr_allowed: true
      active_customer_session_required: false
      purpose: Return public active menu for a tenant/table context without exposing
        bill, cart, or session state.
      query_parameters:
      - qr
      response: PublicMenuResponse
      rules:
      - Menu endpoint MAY accept stale QR.
      - Menu endpoint MUST return only active categories and active visible menu items.
      - Menu endpoint MUST NOT reveal whether an active bill exists.
      - Menu endpoint MUST NOT return cart contents.
      - Menu endpoint MUST NOT create customer session.
    sessions:
    - id: COA-100
      method: POST
      path: /sessions/join
      authentication_required: false
      fresh_qr_required: true
      purpose: Join or create a customer session using a fresh QR token.
      request: JoinCustomerSessionRequest
      response: JoinCustomerSessionResponse
      idempotency_required: true
      sets_cookie: customer_session
      rules:
      - Session join MUST require fresh QR token.
      - Session join MUST validate token hash in resolved tenant database.
      - Session join MUST consume the fresh QR token.
      - Session join MUST rotate table QR after successful consume.
      - Session join MUST create an active customer session with 10 minute initial
        TTL.
      - Session join MUST create one active cart for the session.
      - Session join MUST set customer session through HttpOnly Secure cookie.
    - id: COA-101
      method: POST
      path: /sessions/extend
      authentication_required: true
      active_customer_session_required: true
      purpose: Extend an active customer session by explicit user-visible action within
        extension limits.
      request: ExtendCustomerSessionRequest
      response: CustomerSessionResponse
      idempotency_required: true
      rules:
      - Session extension MUST require active customer session.
      - Session extension MUST require explicit user-visible action.
      - Session extension MUST NOT require scanning a new fresh QR.
      - Session extension MUST add at most 10 minutes.
      - Session extension MUST fail after 3 extensions or 40 minutes total lifetime.
    - id: COA-102
      method: GET
      path: /sessions/current
      authentication_required: true
      active_customer_session_required: true
      purpose: Return the current active customer session state and remaining lifetime.
      response: CustomerSessionResponse
      rules:
      - Current session endpoint MUST require active customer session.
      - Current session endpoint MUST NOT revive expired or offline sessions.
    bill:
    - id: COA-200
      method: GET
      path: /bill/current
      authentication_required: true
      active_customer_session_required: true
      purpose: Return current bill/adisyon summary visible to an active customer session.
      response: CustomerBillResponse
      rules:
      - Bill view MUST require active customer session.
      - Bill view MUST NOT be available from stale QR.
      - Bill view MUST return only bill data for the session table in the resolved
        tenant database.
    cart:
    - id: COA-300
      method: GET
      path: /cart
      authentication_required: true
      active_customer_session_required: true
      purpose: Return current customer cart.
      response: CustomerCartResponse
      rules:
      - Cart read MUST require active customer session.
    - id: COA-301
      method: POST
      path: /cart/items
      authentication_required: true
      active_customer_session_required: true
      purpose: Add an orderable menu item to the current customer cart.
      request: AddCustomerCartItemRequest
      response: CustomerCartResponse
      idempotency_required: true
      rules:
      - Add cart item MUST require active customer session.
      - Add cart item MUST reject inactive or non-orderable menu items.
      - Add cart item MUST snapshot current item name, price, currency, and station
        routing.
    - id: COA-302
      method: PATCH
      path: /cart/items/{cartItemId}
      authentication_required: true
      active_customer_session_required: true
      purpose: Update quantity or note for a current cart item.
      request: UpdateCustomerCartItemRequest
      response: CustomerCartResponse
      idempotency_required: true
      rules:
      - Cart item update MUST require active customer session.
      - Cart item update MUST only affect the current session cart.
      - Quantity MUST remain positive.
    - id: COA-303
      method: DELETE
      path: /cart/items/{cartItemId}
      authentication_required: true
      active_customer_session_required: true
      purpose: Remove an item from the current customer cart.
      response: CustomerCartResponse
      idempotency_required: true
      rules:
      - Cart item delete MUST require active customer session.
      - Cart item delete MUST only affect the current session cart.
    orders:
    - id: COA-400
      method: POST
      path: /orders/submit
      authentication_required: true
      active_customer_session_required: true
      purpose: Submit the current customer cart as exactly one order and move the
        customer session offline.
      request: SubmitCustomerOrderRequest
      response: SubmitCustomerOrderResponse
      idempotency_required: true
      clears_or_locks_cart: true
      moves_session_offline: true
      rules:
      - Order submit MUST require active customer session.
      - Order submit MUST require non-empty cart.
      - Order submit MUST revalidate current price and station routing for all cart
        items.
      - Order submit MUST create exactly one order.
      - Order submit MUST create order items and station tickets grouped by station.
      - Order submit MUST lock or submit the cart.
      - Order submit MUST move the customer session offline immediately after success.
      - Order submit MUST be atomic.
      - Submit response MUST be the only customer-visible order confirmation in the
        initial product version.
  request_response_contracts:
    JoinCustomerSessionRequest:
      required:
      - qr_token
      rules:
      - qr_token plaintext MUST NOT be logged.
    JoinCustomerSessionResponse:
      fields:
      - session_id
      - table_id
      - expires_at_utc
      - extension_count
      - max_extensions
      - max_expires_at_utc
      - cart
      cookie:
        name: customer_session
        http_only: true
        secure: true
        same_site: Lax_or_Stricter
    CustomerSessionResponse:
      fields:
      - session_id
      - table_id
      - status
      - expires_at_utc
      - extension_count
      - max_extensions
      - max_expires_at_utc
      - server_time_utc
    PublicMenuResponse:
      fields:
      - tenant_display_name
      - table_display_name
      - categories
      - items
      forbidden_fields:
      - bill_exists
      - bill_total
      - cart
      - customer_session
      - active_order_count
    AddCustomerCartItemRequest:
      required:
      - menu_item_id
      - quantity
      optional:
      - note
      rules:
      - quantity MUST be positive.
    UpdateCustomerCartItemRequest:
      optional:
      - quantity
      - note
      rules:
      - At least one mutable field MUST be present.
      - quantity MUST be positive when provided.
    SubmitCustomerOrderRequest:
      optional:
      - client_note
      rules:
      - Request MUST NOT include trusted price totals.
      - Server MUST calculate all totals.
    SubmitCustomerOrderResponse:
      fields:
      - order_id
      - order_number
      - status
      - submitted_at_utc
      - total_amount
      - currency
      - station_ticket_count
      - session_status
      fixed_values:
        session_status: offline
  security_and_audit:
    security_rules:
    - QR token plaintext MUST NOT be logged.
    - Customer session cookie MUST be HttpOnly and Secure.
    - Customer session cookie MUST NOT be accessible to browser JavaScript.
    - Order submit MUST not trust client-side totals or prices.
    - All customer operations MUST execute only inside the resolved tenant database.
    audit_or_event_required_for:
    - fresh_qr_consumed
    - customer_session_joined
    - customer_session_extended
    - customer_order_submitted
    - customer_session_moved_offline
  forbidden_behavior:
  - customer_order_api_on_platform_domain
  - customer_order_api_cross_tenant_query
  - customer_session_token_in_local_storage
  - customer_session_cookie_without_http_only
  - customer_session_cookie_without_secure
  - stale_qr_session_join
  - stale_qr_bill_view
  - stale_qr_cart_mutation
  - stale_qr_order_submit
  - public_menu_revealing_bill_state
  - cart_mutation_without_active_customer_session
  - order_submit_without_active_customer_session
  - post_submit_customer_order_status_lookup_initial_version
  - order_submit_without_idempotency
  - cart_mutation_without_idempotency
  - order_submit_trusting_client_price_or_total
  - order_submit_without_price_revalidation
  - order_submit_without_station_routing_revalidation
  - customer_login_required_initial_version
  - customer_phone_required_initial_version
  open_decisions: []
  done_when:
  - customer_order_api_policy_is_defined
  - customer_access_policy_is_defined
  - common_contract_rules_are_defined
  - public_menu_endpoint_is_defined
  - session_join_endpoint_is_defined
  - session_extend_endpoint_is_defined
  - session_current_endpoint_is_defined
  - bill_current_endpoint_is_defined
  - cart_read_endpoint_is_defined
  - cart_mutation_endpoints_are_defined
  - order_submit_endpoint_is_defined
  - request_response_contracts_are_defined
  - security_and_audit_rules_are_defined
  - forbidden_customer_order_api_behavior_is_defined
platform_api:
  purpose:
    rule: Define the platform API contract surface for tenant lifecycle, provisioning,
      schema jobs, platform jobs, audit, settings, and health.
    audience:
    - platform_owner
    - llm_coding_agent
    base_path: /api/platform
  api_policy:
    authentication_required: true
    authorization: platform_owner_only
    response_format: json
    error_format: problem_details
    pagination_required_for_lists: true
    idempotency_required_for_mutations: true
    audit_required_for_state_changes: true
    command_style_mutations: true
    rules:
    - Every platform API endpoint MUST require authenticated platform_owner access.
    - List endpoints MUST support pagination.
    - State-changing endpoints MUST require idempotency keys.
    - State-changing endpoints MUST create platform audit records when the operation
      succeeds or fails after validation starts.
    - Command-style state changes MUST use POST endpoints with explicit command names.
    - Platform API MUST NOT expose tenant operational workflows.
    - Platform API MUST NOT directly activate tenant operations.
  common_headers:
    request:
      required_for_mutations:
      - name: Idempotency-Key
        type: string
        required: true
        applies_to: state_changing_requests
      optional:
      - name: X-Correlation-Id
        type: string
        required: false
        applies_to: all_requests
    response:
      required:
      - name: X-Correlation-Id
        type: string
        applies_to: all_responses
  common_error_contract:
    format: problem_details
    content_type: application/problem+json
    fields:
    - type
    - title
    - status
    - detail
    - instance
    - correlationId
    - errors
    rules:
    - Validation failures MUST return 400 with field-level errors.
    - Authentication failures MUST return 401.
    - Authorization failures MUST return 403.
    - Missing resources MUST return 404.
    - State conflicts MUST return 409.
    - Idempotency conflicts MUST return 409.
    - Unexpected failures MUST return 500 with correlationId.
  pagination_contract:
    query_parameters:
      page:
        type: integer
        minimum: 1
        default: 1
      pageSize:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    response_fields:
    - items
    - page
    - pageSize
    - totalItems
    - totalPages
    rules:
    - List responses MUST use the standard pagination response shape.
    - pageSize MUST NOT exceed 100.
  endpoint_groups:
    tenants:
      base_path: /api/platform/tenants
      endpoints:
      - id: list_tenants
        method: GET
        path: /api/platform/tenants
        purpose: List tenants with lifecycle, domain, provisioning, and tenant operations
          activation summary.
        query:
        - status
        - search
        - page
        - pageSize
        response: PaginatedTenantSummaryResponse
        audit: false
      - id: create_tenant
        method: POST
        path: /api/platform/tenants
        purpose: Create a tenant lifecycle record and start provisioning.
        request: CreateTenantRequest
        response: TenantDetailResponse
        idempotency_required: true
        audit_events:
        - tenant_created
        - tenant_creation_failed
        rules:
        - Tenant creation MUST create platform lifecycle metadata and start provisioning.
        - Tenant creation MUST NOT mark tenant operations active.
        - Tenant slug MUST be provided by platform_owner and MUST be immutable after
          creation.
      - id: validate_tenant_domain
        method: GET
        path: /api/platform/tenants/validate-domain
        purpose: Validate a tenant domain for Caddy On-Demand TLS SSL provisioning.
        query:
        - domain
        response: ValidateDomainResponse
        authentication_required: false
        audit: false
        rules:
        - Validate domain MUST return 200 OK with valid=true if the domain is registered and active.
        - Validate domain MUST return 404 Not Found or valid=false if the domain is not registered.
        - This endpoint MUST be fast (low latency) and accessible from localhost without credentials.
      - id: get_tenant
        method: GET
        path: /api/platform/tenants/{tenantId}
        purpose: Get tenant detail for platform inspection.
        response: TenantDetailResponse
        audit: false
      - id: suspend_tenant
        method: POST
        path: /api/platform/tenants/{tenantId}/suspend
        purpose: Suspend an active tenant.
        request: ReasonCommandRequest
        response: TenantDetailResponse
        idempotency_required: true
        audit_events:
        - tenant_suspended
      - id: reactivate_tenant
        method: POST
        path: /api/platform/tenants/{tenantId}/reactivate
        purpose: Reactivate a suspended tenant when eligible.
        request: ReasonCommandRequest
        response: TenantDetailResponse
        idempotency_required: true
        audit_events:
        - tenant_reactivated
        rules:
        - Only suspended tenants MAY be reactivated in the initial product version.
        - Deactivated tenants MUST NOT be reactivated in the initial product version.
      - id: deactivate_tenant
        method: POST
        path: /api/platform/tenants/{tenantId}/deactivate
        purpose: Deactivate a tenant as a terminal lifecycle action for the initial
          product version.
        request: ReasonCommandRequest
        response: TenantDetailResponse
        idempotency_required: true
        audit_events:
        - tenant_deactivated
    tenant_provisioning:
      base_path: /api/platform/tenants/{tenantId}/provisioning
      endpoints:
      - id: get_tenant_provisioning
        method: GET
        path: /api/platform/tenants/{tenantId}/provisioning
        purpose: Get latest provisioning status for one tenant.
        response: TenantProvisioningResponse
        audit: false
      - id: retry_tenant_provisioning
        method: POST
        path: /api/platform/tenants/{tenantId}/provisioning/retry
        purpose: Retry failed provisioning idempotently without destructive automatic
          cleanup.
        request: ReasonCommandRequest
        response: TenantProvisioningResponse
        idempotency_required: true
        audit_events:
        - tenant_provisioning_retry_requested
        - tenant_provisioning_retry_started
        rules:
        - Retry MUST be allowed only when tenant lifecycle status is provisioning_failed.
        - Retry MUST NOT drop an existing tenant database automatically.
        - Retry MUST recheck already-created resources before creating missing resources.
    tenant_schema_jobs:
      base_path: /api/platform/tenants/{tenantId}
      endpoints:
      - id: get_tenant_database
        method: GET
        path: /api/platform/tenants/{tenantId}/database
        purpose: Get tenant database registry, health, and schema state.
        response: TenantDatabaseResponse
        audit: false
      - id: list_tenant_schema_jobs
        method: GET
        path: /api/platform/tenants/{tenantId}/schema-jobs
        purpose: List schema jobs for one tenant.
        query:
        - status
        - page
        - pageSize
        response: PaginatedJobSummaryResponse
        audit: false
      - id: create_tenant_schema_job
        method: POST
        path: /api/platform/tenants/{tenantId}/schema-jobs
        purpose: Start a tenant schema check or schema update job.
        request: CreateSchemaJobRequest
        response: JobDetailResponse
        idempotency_required: true
        audit_events:
        - tenant_schema_job_started
    platform_jobs:
      base_path: /api/platform/jobs
      endpoints:
      - id: list_platform_jobs
        method: GET
        path: /api/platform/jobs
        purpose: List platform jobs across provisioning and schema change jobs.
        query:
        - type
        - status
        - tenantId
        - page
        - pageSize
        response: PaginatedJobSummaryResponse
        audit: false
      - id: get_platform_job
        method: GET
        path: /api/platform/jobs/{jobId}
        purpose: Get one platform job detail including steps, failures, retry history,
          and audit trail.
        response: JobDetailResponse
        audit: false
    platform_audit:
      base_path: /api/platform/audit
      endpoints:
      - id: list_platform_audit
        method: GET
        path: /api/platform/audit
        purpose: List platform audit records.
        query:
        - eventType
        - severity
        - actorType
        - tenantId
        - jobId
        - createdFrom
        - createdTo
        - page
        - pageSize
        response: PaginatedPlatformAuditResponse
        audit: false
    platform_settings:
      base_path: /api/platform/settings
      endpoints:
      - id: get_platform_settings
        method: GET
        path: /api/platform/settings
        purpose: Get editable and read-only platform settings.
        response: PlatformSettingsResponse
        audit: false
      - id: patch_platform_settings
        method: PATCH
        path: /api/platform/settings
        purpose: Partially update editable platform settings.
        request: PatchPlatformSettingsRequest
        response: PlatformSettingsResponse
        idempotency_required: true
        audit_events:
        - platform_setting_updated
        - platform_setting_update_rejected
    platform_health:
      base_path: /api/platform/health
      endpoints:
      - id: get_platform_health
        method: GET
        path: /api/platform/health
        purpose: Get platform health summary used by the platform UI.
        response: PlatformHealthResponse
        audit: false
  request_response_contracts:
    ValidateDomainResponse:
      fields:
      - valid
      rules:
      - valid MUST be true if the domain exists and is in active lifecycle state.
      - valid MUST be false if the domain is suspended, deactivated, or not found.
    CreateTenantRequest:
      required_fields:
      - tenantDisplayName
      - tenantSlug
      - tenantOwnerFullName
      - tenantOwnerEmail
      - businessType
      - defaultLocale
      - defaultCurrency
      - timezone
      - initialPlan
      optional_fields:
      - tenantOwnerPhone
      - notes
      rules:
      - tenantSlug MUST be safe for {tenant}.iotables.net subdomain use.
      - tenantSlug MUST be globally unique and immutable after creation.
      - businessType MUST use the tenant setup allowed business type catalog.
    TenantDetailResponse:
      fields:
      - tenantId
      - tenantDisplayName
      - tenantSlug
      - tenantDomain
      - lifecycleStatus
      - provisioningStatus
      - tenantDatabaseStatus
      - tenantSchemaVersion
      - operationsActivationSummary
      rules:
      - operationsActivationSummary MAY be read from tenant database for platform
        inspection but MUST NOT be mutated by platform API.
    ReasonCommandRequest:
      required_fields:
      - reason
      rules:
      - reason MUST be non-empty.
    CreateSchemaJobRequest:
      required_fields:
      - mode
      allowed_modes:
      - check
      - apply_latest
      optional_fields:
      - reason
    PatchPlatformSettingsRequest:
      optional_fields:
      - defaultLocale
      - defaultCurrency
      - defaultTimezone
      - tenantOwnerActivationInviteTtlHours
      - provisioningRetryLimit
      rules:
      - Request MUST include at least one editable setting.
      - Request MUST NOT include read-only settings.
  forbidden_behavior:
  - platform_api_without_authentication
  - platform_api_for_non_platform_owner
  - tenant_operational_endpoint_under_platform_api
  - platform_api_directly_activating_tenant_operations
  - mutation_without_idempotency_key
  - state_change_without_audit
  - list_endpoint_without_pagination
  - custom_error_shape_outside_problem_details
  - reactivate_deactivated_tenant_initial_version
  - create_tenant_without_tenant_slug
  - tenant_slug_update_after_creation
  - provisioning_retry_dropping_existing_tenant_database
  open_decisions: []
  done_when:
  - platform_api_policy_is_defined
  - common_headers_are_defined
  - common_error_contract_is_defined
  - pagination_contract_is_defined
  - tenant_endpoints_are_defined
  - tenant_provisioning_endpoints_are_defined
  - tenant_schema_job_endpoints_are_defined
  - platform_job_endpoints_are_defined
  - platform_audit_endpoints_are_defined
  - platform_settings_endpoints_are_defined
  - platform_health_endpoint_is_defined
  - request_response_contract_names_are_defined
  - forbidden_api_behavior_is_defined
tenant_setup_api:
  purpose:
    rule: Define tenant internal API contracts for setup status, business profile,
      operating defaults, tables, stations, menu, assets, staff invites, firmware
      download, and operations activation.
    applies_to:
    - tenant_setup_console
    - tenant_internal_api
    - tenant_setup_data
    - tenant_database_isolation
    - table_specific_firmware_generation
  api_family:
    route_root: https://{tenant}.iotables.net/api/internal
    tenant_resolution: subdomain
    database_context: resolved_tenant_database_only
    authentication_required: true
    authorization_model: permission_based
    rules:
    - Tenant setup API MUST be served only from the tenant domain.
    - Tenant setup API MUST NOT be served from platform.iotables.net.
    - Tenant setup API MUST resolve exactly one tenant database from the request subdomain.
    - Tenant setup API MUST NOT query or mutate another tenant database.
    - Tenant setup API MUST NOT store tenant operational data in the platform database.
    - Tenant setup API MUST enforce permissions, not role names.
  common_contract_rules:
    id_format: uuid
    timestamp_format: iso_8601_utc
    request_body_format: json
    response_body_format: json
    error_format: problem_details
    idempotency:
      required_for:
      - operations_activation
      - firmware_generation
      - firmware_download
      - staff_invite_creation
    rules:
    - Mutation endpoints SHOULD return the updated resource or operation result.
    - Validation errors MUST use ProblemDetails.
    - Secret fields MUST NOT be returned except inside explicit firmware artifact
      download responses.
    - Firmware artifact responses MUST be non-cacheable.
  common_error_contract:
    format: problem_details
    content_type: application/problem+json
    fields:
    - type
    - title
    - status
    - detail
    - instance
    - correlationId
    - errors
    rules:
    - Every tenant setup API error response with a JSON body MUST use application/problem+json.
    - Validation failures MUST return 400 with field-level errors.
    - Authentication failures MUST return 401.
    - Authorization failures MUST return 403.
    - Missing resources MUST return 404.
    - State conflicts and idempotency conflicts MUST return 409.
    - Unexpected failures MUST return 500 with correlationId.
  endpoints:
    setup_status:
    - id: TSA-001
      method: GET
      path: /setup/status
      required_permission: tenant.setup.view
      purpose: Return setup progress, completed steps, activation status, and blocking
        activation gates.
      response: TenantSetupStatusResponse
    business_profile:
    - id: TSA-010
      method: GET
      path: /setup/business-profile
      required_permission: tenant.setup.view
      purpose: Return tenant business profile and operating identity fields.
      response: BusinessProfileResponse
    - id: TSA-011
      method: PATCH
      path: /setup/business-profile
      required_permission: tenant.profile.update
      purpose: Update tenant business profile.
      request: UpdateBusinessProfileRequest
      response: BusinessProfileResponse
    operating_defaults:
    - id: TSA-020
      method: PATCH
      path: /setup/operating-defaults
      required_permission: tenant.profile.update
      purpose: Update default service mode, tax display mode, and optional operating
        defaults.
      request: UpdateOperatingDefaultsRequest
      response: OperatingDefaultsResponse
    assets:
    - id: TSA-030
      method: POST
      path: /assets/images
      required_permission: tenant.menu.items.create
      purpose: Upload an internal tenant image asset for menu item images or tenant
        setup visuals.
      request: UploadImageAssetRequest
      response: ImageAssetResponse
      rules:
      - Image upload MUST store the asset in tenant-scoped storage or tenant-owned
        asset namespace.
      - Image upload MUST return image_asset_id.
      - Menu item creation MUST use image_asset_id.
    tables:
    - id: TSA-100
      method: GET
      path: /tables
      required_permission: tenant.tables.view
      purpose: List tenant tables including operational and system test tables.
      response: TableListResponse
    - id: TSA-101
      method: POST
      path: /tables
      required_permission: tenant.tables.create
      purpose: Create an operational table and optionally generate table-specific
        ESP32 firmware when has_qr_device=true.
      request: CreateTableRequest
      response: TableResponse
      idempotency_required: true
      rules:
      - If table creation generates firmware immediately, the actor MUST also have
        tenant.firmware.generate.
    - id: TSA-102
      method: PATCH
      path: /tables/{tableId}
      required_permission: tenant.tables.update
      purpose: Update table display, status, QR-device option, or operational metadata.
      request: UpdateTableRequest
      response: TableResponse
    - id: TSA-103
      method: POST
      path: /tables/{tableId}/firmware/generate
      required_permission: tenant.firmware.generate
      purpose: Generate or regenerate table-specific ESP32 firmware for a table with
        QR device enabled.
      request: GenerateFirmwareRequest
      response: FirmwareGenerationResponse
      idempotency_required: true
      rules:
      - Firmware generation MUST be limited to tenant_owner and tenant_admin through
        fixed role-permission bundles.
      - Firmware regeneration MUST revoke old device secret.
      - Firmware generation MUST be audited.
    - id: TSA-104
      method: POST
      path: /tables/{tableId}/firmware/download
      required_permission: tenant.firmware.download
      purpose: Download the table-specific firmware artifact as a secret, audited,
        non-cacheable response.
      request: DownloadFirmwareRequest
      response: FirmwareDownloadResponse
      idempotency_required: true
      cache_policy: no_store
      rules:
      - Firmware download MUST be limited to tenant_owner and tenant_admin through
        fixed role-permission bundles.
      - Firmware download MUST use POST, not GET.
      - Firmware download MUST be audited.
      - Firmware artifact MUST be treated as a secret.
      - Firmware response MUST NOT be cached.
    stations:
    - id: TSA-200
      method: GET
      path: /stations
      required_permission: tenant.stations.view
      purpose: List fulfillment stations.
      response: StationListResponse
    - id: TSA-201
      method: POST
      path: /stations
      required_permission: tenant.stations.create
      purpose: Create a station.
      request: CreateStationRequest
      response: StationResponse
    - id: TSA-202
      method: PATCH
      path: /stations/{stationId}
      required_permission: tenant.stations.update
      purpose: Update station details or status.
      request: UpdateStationRequest
      response: StationResponse
    menu_categories:
    - id: TSA-300
      method: GET
      path: /menu/categories
      required_permission: tenant.menu.view
      purpose: List menu categories.
      response: MenuCategoryListResponse
    - id: TSA-301
      method: POST
      path: /menu/categories
      required_permission: tenant.menu.categories.manage
      purpose: Create a menu category.
      request: CreateMenuCategoryRequest
      response: MenuCategoryResponse
    - id: TSA-302
      method: PATCH
      path: /menu/categories/{categoryId}
      required_permission: tenant.menu.categories.manage
      purpose: Update menu category details or status.
      request: UpdateMenuCategoryRequest
      response: MenuCategoryResponse
    menu_items:
    - id: TSA-400
      method: GET
      path: /menu/items
      required_permission: tenant.menu.view
      purpose: List menu items, price, image, orderability, and station routing.
      response: MenuItemListResponse
    - id: TSA-401
      method: POST
      path: /menu/items
      required_permission: tenant.menu.items.create
      purpose: Create a menu item.
      request: CreateMenuItemRequest
      response: MenuItemResponse
    - id: TSA-402
      method: PATCH
      path: /menu/items/{itemId}
      required_permission: tenant.menu.items.update
      purpose: Update menu item details, price, image, status, orderability, or station
        routing.
      request: UpdateMenuItemRequest
      response: MenuItemResponse
      rules:
      - Orderable menu item MUST have price.
      - Orderable menu item MUST have image_asset_id.
      - Orderable menu item MUST route to one active station.
    staff_invites:
    - id: TSA-500
      method: POST
      path: /staff/invites
      required_permissions:
      - tenant.staff.invite
      - tenant.staff.assign_roles
      purpose: Create one or more tenant staff invitations from setup quick-add or
        staff administration.
      request: CreateStaffInvitesRequest
      response: StaffInviteListResponse
      idempotency_required: true
      rules:
      - tenant_owner role MUST NOT be assignable from staff invite API.
      - Platform roles MUST NOT be assignable from tenant staff invite API.
    activation:
    - id: TSA-600
      method: GET
      path: /setup/activation-gates
      required_permission: tenant.setup.view
      purpose: Return operations activation gate status and blockers.
      response: ActivationGatesResponse
    - id: TSA-601
      method: POST
      path: /setup/activate-operations
      required_permission: tenant.setup.complete
      purpose: Activate tenant operations when all required setup gates pass.
      request: ActivateOperationsRequest
      response: ActivateOperationsResponse
      idempotency_required: true
      rules:
      - Activation MUST run gate checks against the resolved tenant database only.
      - Activation MUST fail if required gates do not pass.
      - Activation MUST be audited.
  request_response_contracts:
    CreateTableRequest:
      required:
      - table_number
      - has_qr_device
      optional:
      - display_name
      - area_or_section
      - seat_capacity
      - wifi_ssid
      - wifi_password
      rules:
      - wifi_ssid and wifi_password are required when has_qr_device=true and firmware
        is generated immediately.
      - wifi_ssid and wifi_password MUST NOT be logged.
    TableResponse:
      fields:
      - table_id
      - table_number
      - table_code
      - display_name
      - table_type
      - status
      - has_qr_device
      - customer_self_ordering_enabled
      - staff_pda_ordering_enabled
      - device_status
      - created_at_utc
      - updated_at_utc
    FirmwareDownloadResponse:
      content_type: application/octet-stream_or_text_plain_ino
      cache_policy: no_store
      contains_secret_material: true
    CreateMenuItemRequest:
      required:
      - category_id
      - name
      - image_asset_id
      - orderable
      required_when_orderable:
      - price_amount
      - station_id
      optional:
      - description
      - sort_order
      - non_orderable_badge
    CreateStaffInvitesRequest:
      batch_supported: true
      items_required_fields:
      - display_name
      - email
      - role
      items_optional_fields:
      - phone
      - station_id
  security_and_audit:
    rules:
    - All tenant setup API mutations MUST be authenticated.
    - All tenant setup API mutations MUST enforce tenant permissions.
    - Firmware generation, firmware download, operations activation, and staff invites
      MUST be audited.
    - Wi-Fi credentials, firmware secrets, device secrets, and invite tokens MUST
      NOT be logged in plaintext.
    - Firmware download responses MUST include no-store cache headers.
  forbidden_behavior:
  - tenant_setup_api_on_platform_domain
  - tenant_setup_api_using_platform_database_for_tenant_operational_data
  - tenant_setup_api_cross_tenant_query
  - firmware_generation_authorized_by_table_update_permission_only
  - firmware_download_authorized_by_table_update_permission_only
  - firmware_permission_granted_to_tenant_manager_initial_version
  - firmware_download_get_endpoint
  - firmware_download_cacheable_response
  - plaintext_wifi_credentials_logging
  - plaintext_device_secret_logging
  - tenant_owner_role_invite_from_staff_api
  - platform_role_invite_from_tenant_api
  - orderable_menu_item_without_price
  - orderable_menu_item_without_image
  - orderable_menu_item_without_station_routing
  open_decisions: []
  done_when:
  - tenant_setup_api_family_is_defined
  - common_contract_rules_are_defined
  - setup_status_endpoints_are_defined
  - business_profile_endpoints_are_defined
  - operating_defaults_endpoints_are_defined
  - asset_image_upload_endpoint_is_defined
  - table_endpoints_are_defined
  - firmware_generation_and_download_endpoints_are_defined
  - station_endpoints_are_defined
  - menu_category_endpoints_are_defined
  - menu_item_endpoints_are_defined
  - staff_invite_endpoint_is_defined
  - activation_endpoints_are_defined
  - request_response_contracts_are_defined
  - security_and_audit_rules_are_defined
  - forbidden_api_behavior_is_defined
tenant_staff_identity_api:
  purpose:
    rule: Define tenant identity API contracts for tenant owner activation, staff
      invite validation, staff invite activation, login, logout, current user, password
      flows, staff user administration, role assignment, disable behavior, and tenant-domain-only
      authentication.
    applies_to:
    - tenant_owner_activation
    - tenant_staff_identity
    - tenant_staff_activation
    - tenant_authentication
    - tenant_internal_api
    - tenant_staff_admin
  api_policy:
    tenant_domain_only: true
    platform_domain_for_tenant_staff_login: false
    tenant_resolution: subdomain
    database_context: resolved_tenant_database_only
    authentication_model: tenant_scoped_staff_authentication
    authorization_model: permission_based
    hard_delete_endpoint_available: false
    rules:
    - Tenant identity APIs MUST be served only from tenant domains.
    - Tenant identity APIs MUST NOT be served from platform.iotables.net.
    - Tenant staff authentication MUST resolve exactly one tenant database from the
      request subdomain.
    - Tenant identity APIs MUST NOT query or mutate another tenant database.
    - Tenant identity APIs MUST NOT store tenant identity data in the platform database.
    - Tenant identity APIs MUST enforce permissions, not role names.
    - No hard-delete staff endpoint MUST exist in the initial product version.
  route_families:
    public_tenant_auth: https://{tenant}.iotables.net/api/auth/**
    internal_staff_admin: https://{tenant}.iotables.net/api/internal/staff/**
    rules:
    - Owner activation, invite validation, invite activation, login, logout, current
      user, and password endpoints belong to api/auth.
    - Staff user listing, update, disable, and role assignment endpoints belong to
      api/internal/staff.
  common_contract_rules:
    id_format: uuid
    timestamp_format: iso_8601_utc
    request_body_format: json
    response_body_format: json
    error_format: problem_details
    token_storage: hash_only
    idempotency:
      required_for:
      - owner_activation
      - invite_activation
      - password_reset
      - staff_disable
      - role_assignment
    rules:
    - Validation errors MUST use ProblemDetails.
    - Owner activation token plaintext MUST NOT be logged.
    - Invite token plaintext MUST NOT be logged.
    - Password plaintext MUST NOT be logged.
    - Password hashes MUST NOT be returned by any API.
    - Two-factor secrets MUST NOT be returned by any API except explicit future setup
      flows.
  common_error_contract:
    format: problem_details
    content_type: application/problem+json
    fields:
    - type
    - title
    - status
    - detail
    - instance
    - correlationId
    - errors
    rules:
    - Every tenant staff identity API error response with a JSON body MUST use application/problem+json.
    - Validation failures MUST return 400 with field-level errors.
    - Authentication failures MUST return 401.
    - Authorization failures MUST return 403.
    - Missing resources MUST return 404.
    - Token, password reset, invite, and lifecycle conflicts MUST return 409.
    - Unexpected failures MUST return 500 with correlationId.
  endpoints:
    owner_activation:
    - id: TSI-000
      method: GET
      path: /auth/owner-activation/validate
      authentication_required: false
      query_parameters:
      - token
      purpose: Validate a tenant owner activation token created during platform provisioning
        and return non-secret metadata needed for activation UI.
      response: ValidateTenantOwnerActivationResponse
      rules:
      - Owner activation validation MUST use tenant_owner_activation_invites in the
        resolved tenant database.
      - Owner activation validation MUST check token hash, invite status, expiration,
        and tenant database context.
      - Owner activation validation MUST NOT activate the user.
      - Owner activation validation MUST NOT return invite_token_hash.
      - Owner activation validation MUST NOT query the platform database for token
        verification.
    - id: TSI-000A
      method: POST
      path: /auth/owner-activation/activate
      authentication_required: false
      purpose: Activate the tenant owner from a valid one-time owner activation token
        and initial password.
      request: ActivateTenantOwnerRequest
      response: ActivateTenantOwnerResponse
      idempotency_required: true
      rules:
      - Owner activation MUST require a valid unexpired pending token from tenant_owner_activation_invites.
      - Owner activation MUST create a tenant_users row in the resolved tenant database.
      - Owner activation MUST create tenant_user_roles assignment with tenant_owner
        role.
      - Owner activation MUST mark the owner activation invite accepted and link accepted_user_id.
      - Owner activation MUST reject duplicate active normalized email within the
        same tenant database.
      - Owner activation MUST NOT use staff_invites.
      - Owner activation MUST NOT be available from platform domain.
    invite_activation:
    - id: TSI-001
      method: GET
      path: /auth/invites/validate
      authentication_required: false
      query_parameters:
      - token
      purpose: Validate a staff invite token and return non-secret invite metadata
        needed for activation UI.
      response: ValidateStaffInviteResponse
      rules:
      - Invite validation MUST use staff_invites in the resolved tenant database.
      - Invite validation MUST check token hash, invite status, expiration, and tenant
        database context.
      - Invite validation MUST NOT activate the user.
      - Invite validation MUST NOT return invite_token_hash.
    - id: TSI-002
      method: POST
      path: /auth/invites/activate
      authentication_required: false
      purpose: Activate a tenant staff user from a valid one-time invite token and
        initial password.
      request: ActivateStaffInviteRequest
      response: ActivateStaffInviteResponse
      idempotency_required: true
      rules:
      - Invite activation MUST require a valid unexpired pending invite token.
      - Invite activation MUST create a tenant_users row in the resolved tenant database.
      - Invite activation MUST create tenant_user_roles assignment from invite role.
      - Invite activation MUST mark the invite accepted and link accepted_user_id.
      - Invite activation MUST reject tenant_owner and platform roles.
      - Invite activation MUST reject duplicate active normalized email within the
        same tenant database.
      - Invite activation MUST NOT use tenant_owner_activation_invites.
    session_authentication:
    - id: TSI-100
      method: POST
      path: /auth/login
      authentication_required: false
      purpose: Authenticate a tenant staff user against the resolved tenant database.
      request: TenantStaffLoginRequest
      response: TenantStaffLoginResponse
      rules:
      - Login MUST use tenant database resolved from subdomain.
      - Login MUST reject disabled users.
      - Login MUST produce tenant-scoped claims and permissions.
      - Login MUST NOT authenticate platform users.
    - id: TSI-101
      method: POST
      path: /auth/logout
      authentication_required: true
      purpose: End the current tenant staff session.
      response: LogoutResponse
    - id: TSI-102
      method: GET
      path: /auth/me
      authentication_required: true
      purpose: Return the current authenticated tenant staff user, roles, and effective
        permissions.
      response: CurrentTenantStaffUserResponse
      rules:
      - Current user response MUST NOT include password hash.
      - Current user response MUST return tenant-scoped roles and effective permissions.
    password:
    - id: TSI-200
      method: POST
      path: /auth/password/forgot
      authentication_required: false
      purpose: Request a password reset email for a tenant staff user in the resolved
        tenant database.
      request: ForgotPasswordRequest
      response: ForgotPasswordResponse
      rules:
      - Response MUST avoid disclosing whether an email exists.
      - Reset token MUST be stored hash-only.
    - id: TSI-201
      method: POST
      path: /auth/password/reset
      authentication_required: false
      purpose: Reset password using a valid password reset token.
      request: ResetPasswordRequest
      response: ResetPasswordResponse
      idempotency_required: true
      rules:
      - Password reset token MUST be one-time-use.
      - New password MUST satisfy tenant password policy.
    - id: TSI-202
      method: POST
      path: /auth/password/change
      authentication_required: true
      purpose: Change password for the current authenticated tenant staff user.
      request: ChangePasswordRequest
      response: ChangePasswordResponse
      rules:
      - Password change MUST require current password.
      - New password MUST satisfy tenant password policy.
    staff_admin:
    - id: TSI-300
      method: GET
      path: /internal/staff/users
      authentication_required: true
      required_permission: tenant.staff.view
      purpose: List tenant staff users and their fixed role assignments.
      response: TenantStaffUserListResponse
    - id: TSI-301
      method: PATCH
      path: /internal/staff/users/{userId}
      authentication_required: true
      required_permission: tenant.staff.update
      purpose: Update tenant staff user profile fields such as display_name or phone.
      request: UpdateTenantStaffUserRequest
      response: TenantStaffUserResponse
    - id: TSI-302
      method: POST
      path: /internal/staff/users/{userId}/disable
      authentication_required: true
      required_permission: tenant.staff.disable
      purpose: Disable a tenant staff user without deleting historical references.
      request: DisableTenantStaffUserRequest
      response: TenantStaffUserResponse
      idempotency_required: true
      rules:
      - Disabled staff user MUST NOT be able to login.
      - Disable operation MUST preserve historical records.
      - Disable operation MUST be audited.
    - id: TSI-303
      method: POST
      path: /internal/staff/users/{userId}/roles
      authentication_required: true
      required_permission: tenant.staff.assign_roles
      purpose: Replace fixed tenant role assignments for a tenant staff user.
      request: AssignTenantStaffRolesRequest
      response: TenantStaffUserResponse
      idempotency_required: true
      rules:
      - Role assignment MUST use fixed tenant role catalog values.
      - Platform roles MUST NOT be assignable.
      - Tenant owner role assignment MUST follow ownership rules and MUST NOT be exposed
        through generic staff role assignment in the initial product version.
      - Role assignment MUST be audited.
  request_response_contracts:
    ActivateTenantOwnerRequest:
      required:
      - token
      - password
      - display_name
      optional:
      - phone
      rules:
      - Password MUST be at least 8 characters long, contain at least 1 uppercase letter, 1 lowercase letter, 1 digit, and 1 special character (matching regex: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$).
      - Token plaintext MUST NOT be logged.
      - Activation MUST assign tenant_owner role.
    ValidateTenantOwnerActivationResponse:
      fields:
      - valid
      - expired
      - invite_status
      - owner_email
      - owner_full_name
      - tenant_display_name
      - role
      fixed_values:
        role: tenant_owner
      forbidden_fields:
      - invite_token_hash
      - password_hash
    ActivateStaffInviteRequest:
      required:
      - token
      - password
      - display_name
      optional:
      - phone
      rules:
      - Password MUST be at least 8 characters long, contain at least 1 uppercase letter, 1 lowercase letter, 1 digit, and 1 special character (matching regex: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$).
      - Token plaintext MUST NOT be logged.
    ValidateStaffInviteResponse:
      fields:
      - valid
      - expired
      - invite_status
      - email
      - display_name
      - role
      - tenant_display_name
      forbidden_fields:
      - invite_token_hash
      - password_hash
    TenantStaffLoginRequest:
      required:
      - email
      - password
      optional:
      - two_factor_code
    TenantStaffLoginResponse:
      fields:
      - access_token_or_session_created
      - user
      - roles
      - permissions
      - requires_two_factor
    CurrentTenantStaffUserResponse:
      fields:
      - user_id
      - display_name
      - email
      - status
      - roles
      - permissions
      - two_factor_enabled
    AssignTenantStaffRolesRequest:
      required:
      - roles
      allowed_roles:
      - tenant_admin
      - tenant_manager
      - cashier
      - floor_staff
      - station_operator
      - accountant
  security_and_audit:
    audit_required_for:
    - tenant_owner_activation_validated
    - tenant_owner_activated
    - staff_invite_activated
    - staff_login_success
    - staff_login_failed
    - password_reset_requested
    - password_reset_completed
    - password_changed
    - staff_user_disabled
    - staff_role_assigned
    rules:
    - Tenant identity API MUST not log owner activation token plaintext.
    - Tenant identity API MUST not log invite token plaintext.
    - Tenant identity API MUST not log password plaintext.
    - Tenant identity API MUST not return password hashes.
    - Owner activation, staff disable, and role assignment MUST be audited.
    - Login failure responses SHOULD avoid user enumeration.
    - Staff accounts MUST be locked out for exactly 15 minutes after 5 consecutive failed login attempts.
    - Consecutive login failures MUST reset to zero immediately upon a successful login.
  forbidden_behavior:
  - tenant_identity_api_on_platform_domain
  - tenant_staff_identity_api_on_platform_domain
  - tenant_staff_login_using_platform_database
  - owner_activation_token_validation_using_platform_database
  - tenant_staff_api_cross_tenant_query
  - tenant_staff_identity_data_in_platform_database
  - owner_activation_invite_in_platform_database
  - hard_delete_staff_endpoint_initial_version
  - disabled_staff_user_login
  - duplicate_active_email_within_same_tenant
  - tenant_owner_role_assigned_from_staff_invite_activation
  - tenant_owner_role_assigned_from_generic_staff_role_endpoint_initial_version
  - platform_role_assigned_from_tenant_staff_api
  - staff_invite_activation_using_owner_activation_table
  - owner_activation_using_staff_invites_table
  - plaintext_owner_activation_token_logging
  - plaintext_invite_token_logging
  - plaintext_password_logging
  - password_hash_returned_by_api
  open_decisions: []
  done_when:
  - tenant_identity_api_policy_is_defined
  - route_families_are_defined
  - common_contract_rules_are_defined
  - owner_activation_validation_endpoint_is_defined
  - owner_activation_endpoint_is_defined
  - invite_validation_endpoint_is_defined
  - invite_activation_endpoint_is_defined
  - login_logout_me_endpoints_are_defined
  - password_flow_endpoints_are_defined
  - staff_admin_endpoints_are_defined
  - request_response_contracts_are_defined
  - security_and_audit_rules_are_defined
  - forbidden_identity_api_behavior_is_defined
bill_session_data:
  purpose:
    rule: Define tenant-owned bill/adisyon session, bill-order attachment, manual
      payment, and bill reopen event data contracts.
    applies_to:
    - tenant_database
    - bill_sessions
    - customer_order_submit
    - staff_pda_order_submit
    - manual_payments
    - cashier_workspace
    - bill_reopen
  isolation_principle:
    model: database_per_tenant
    ownership: tenant_database
    rules:
    - Bill session data MUST be stored only in the resolved tenant database.
    - Bill session data MUST NOT be stored in the platform database.
    - Bill session tables SHOULD NOT include tenant_id for isolation.
    - Bill session isolation MUST be enforced by tenant database boundary.
    - Bill session queries MUST NOT cross tenant database boundaries.
  common_columns:
    required_for_mutable_tables:
    - id
    - created_at_utc
    - updated_at_utc
    id_policy:
      type: uuid
      generated_by: application_or_database
    time_policy:
      timezone: utc
      rules:
      - Mutable bill session tables MUST include created_at_utc and updated_at_utc.
      - Timestamp fields MUST be stored in UTC.
  bill_session_policy:
    one_active_bill_per_table: true
    customer_order_submit_auto_opens_bill_if_none_exists: true
    staff_pda_order_submit_auto_opens_bill_if_none_exists: true
    source_of_truth_for_total: server_side_order_item_snapshots
    rules:
    - A table MUST NOT have more than one active bill session.
    - Bill totals MUST be calculated from non-cancelled order items attached through
      bill_orders.
    - Client-provided bill totals MUST NOT be persisted as source of truth.
    - Closed bill sessions MUST NOT accept new orders unless reopened.
  manual_payment_policy:
    provider_payment_supported: false
    manual_payment_required_to_close: true
    partial_payment_supported_initial_version: false
    overpayment_supported_initial_version: false
    amount_must_match_bill_total_initial_version: true
    payment_methods:
    - cash
    - card_external_pos
    - bank_transfer
    - other
    rules:
    - Manual payment records MUST represent external/offline payment events.
    - Manual payment records MUST NOT imply that IoTable processed a payment provider
      charge.
    - Initial product version MUST require one manual payment record matching bill
      total to close.
    - Partial payments MUST NOT be supported in the initial product version.
    - Overpayments MUST NOT be supported in the initial product version.
  tables:
    bill_sessions:
      ownership: tenant_database
      purpose: Stores table adisyon lifecycle, totals, and close state.
      primary_key: id
      columns:
        id: uuid
        table_id: uuid_required_fk_tables
        status: enum_required
        opened_at_utc: timestamptz_required
        opened_by_user_id: uuid_nullable_fk_tenant_users
        opened_by_source: enum_required
        closing_started_at_utc: timestamptz_nullable
        closing_started_by_user_id: uuid_nullable_fk_tenant_users
        closed_at_utc: timestamptz_nullable
        closed_by_user_id: uuid_nullable_fk_tenant_users
        cancelled_at_utc: timestamptz_nullable
        cancelled_by_user_id: uuid_nullable_fk_tenant_users
        subtotal_amount: numeric_required_default_0
        discount_amount: numeric_required_default_0
        service_charge_amount: numeric_required_default_0
        tax_amount: numeric_required_default_0
        total_amount: numeric_required_default_0
        currency: char3_required_default_TRY
        order_count: integer_required_default_0
        last_order_at_utc: timestamptz_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - open
      - closing
      - closed
      - reopened
      - cancelled
      allowed_opened_by_sources:
      - customer_order_submit
      - staff_pda_order_submit
      - staff_manual_open
      - system
      indexes:
      - ix_bill_sessions_table_status
      - ix_bill_sessions_opened_at
      - ix_bill_sessions_closed_at
      unique_constraints:
      - ux_bill_sessions_one_active_per_table
      constraints:
      - one_active_bill_per_table
      - closed_bill_requires_closed_at
      - cancelled_bill_requires_cancelled_at
      - bill_total_must_not_be_negative
      - client_total_not_source_of_truth
    bill_orders:
      ownership: tenant_database
      purpose: Links submitted orders to bill sessions without embedding bill ownership
        into orders.
      primary_key: id
      columns:
        id: uuid
        bill_session_id: uuid_required_fk_bill_sessions
        order_id: uuid_required_fk_orders
        attached_at_utc: timestamptz_required
        attached_by_source: enum_required
        detached_at_utc: timestamptz_nullable
        detached_by_user_id: uuid_nullable_fk_tenant_users
        detach_reason: text_nullable
        status: enum_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_attached_by_sources:
      - customer_order_submit
      - staff_pda_order_submit
      - staff_manual_attach
      - system
      allowed_statuses:
      - attached
      - detached
      - cancelled
      unique_constraints:
      - ux_bill_orders_order_id
      - ux_bill_orders_bill_order
      indexes:
      - ix_bill_orders_bill_session_id
      - ix_bill_orders_order_id
      constraints:
      - one_order_attaches_to_one_bill
      - order_attach_atomic_with_order_submit
      - attached_order_table_must_match_bill_table
    manual_payments:
      ownership: tenant_database
      purpose: Stores offline/external payment records used to close bill sessions.
      primary_key: id
      columns:
        id: uuid
        bill_session_id: uuid_required_fk_bill_sessions
        amount: numeric_required
        currency: char3_required_default_TRY
        payment_method: enum_required
        external_reference: text_nullable
        note: text_nullable
        recorded_by_user_id: uuid_required_fk_tenant_users
        recorded_at_utc: timestamptz_required
        status: enum_required
        voided_at_utc: timestamptz_nullable
        voided_by_user_id: uuid_nullable_fk_tenant_users
        void_reason: text_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_payment_methods:
      - cash
      - card_external_pos
      - bank_transfer
      - other
      allowed_statuses:
      - recorded
      - voided
      indexes:
      - ix_manual_payments_bill_session_id
      - ix_manual_payments_recorded_at
      constraints:
      - manual_payment_amount_positive
      - manual_payment_amount_must_match_bill_total_initial_version
      - partial_payment_forbidden_initial_version
      - overpayment_forbidden_initial_version
      - manual_payment_is_not_provider_charge
      - voided_payment_requires_void_reason
    bill_reopen_events:
      ownership: tenant_database
      purpose: Stores audited reopen events for closed bill sessions.
      primary_key: id
      columns:
        id: uuid
        bill_session_id: uuid_required_fk_bill_sessions
        previous_status: enum_required
        reopened_by_user_id: uuid_required_fk_tenant_users
        reason: text_required
        reopened_at_utc: timestamptz_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_previous_statuses:
      - closed
      indexes:
      - ix_bill_reopen_events_bill_session_id
      - ix_bill_reopen_events_reopened_at
      constraints:
      - bill_reopen_reason_required
      - bill_reopen_actor_required
      - bill_reopen_previous_status_required
      - reopen_only_from_closed
  bill_close_data_rules:
    atomic_operation: true
    updates:
    - bill_sessions
    creates:
    - manual_payments
    rules:
    - Bill close MUST create a manual_payments row and set bill_sessions.status=closed
      atomically.
    - Bill close MUST re-read and recalculate bill total inside the transaction.
    - Bill close MUST reject client-provided totals as source of truth.
    - Bill close MUST reject partial or overpayment in the initial product version.
  bill_reopen_data_rules:
    atomic_operation: true
    updates:
    - bill_sessions
    creates:
    - bill_reopen_events
    rules:
    - Bill reopen MUST create a bill_reopen_events row and reopen bill session atomically.
    - Bill reopen MUST require reason and actor.
    - Bill reopen MUST fail if another active bill exists for the same table.
  integration_with_customer_order_data:
    order_attachment: bill_orders
    rules:
    - orders table MUST NOT need bill_session_id for bill ownership.
    - Bill ownership of orders MUST be represented by bill_orders.
    - Order submit transaction MUST create bill_orders after creating orders.
    - Bill total recalculation MUST use bill_orders joined to order_items.
  forbidden_behavior:
  - bill_session_data_in_platform_database
  - multiple_active_bills_per_table
  - order_attached_to_multiple_bills
  - bill_order_table_mismatch
  - bill_close_without_manual_payment
  - bill_close_without_recalculating_total
  - bill_close_trusting_client_total
  - manual_payment_provider_charge_initial_version
  - partial_payment_initial_version
  - overpayment_initial_version
  - bill_reopen_without_reason
  - bill_reopen_without_actor
  - bill_reopen_when_another_active_bill_exists
  open_decisions: []
  done_when:
  - bill_session_data_isolation_is_defined
  - bill_session_policy_is_defined
  - manual_payment_policy_is_defined
  - bill_sessions_table_is_defined
  - bill_orders_table_is_defined
  - manual_payments_table_is_defined
  - bill_reopen_events_table_is_defined
  - bill_close_data_rules_are_defined
  - bill_reopen_data_rules_are_defined
  - customer_order_data_integration_is_defined
  - forbidden_bill_session_data_behavior_is_defined
customer_order_data:
  purpose:
    rule: Define tenant-owned customer QR token, customer session, cart, order, order
      item, station ticket, and bill attachment data rules for customer ordering flows.
    applies_to:
    - tenant_database
    - customer_qr_access
    - customer_sessions
    - customer_carts
    - customer_orders
    - station_tickets
    - bill_sessions
    - table_qr_security
  isolation_principle:
    model: database_per_tenant
    ownership: tenant_database
    rules:
    - Customer ordering data MUST be stored only in the resolved tenant database.
    - Customer ordering data MUST NOT be stored in the platform database.
    - Customer ordering tables SHOULD NOT include tenant_id for isolation.
    - Customer ordering isolation MUST be enforced by tenant database boundary.
    - Customer ordering queries MUST NOT cross tenant database boundaries.
  common_columns:
    required_for_mutable_tables:
    - id
    - created_at_utc
    - updated_at_utc
    id_policy:
      type: uuid
      generated_by: application_or_database
    time_policy:
      timezone: utc
      rules:
      - Mutable customer ordering tables MUST include created_at_utc and updated_at_utc.
      - Timestamp fields MUST be stored in UTC.
  qr_token_policy:
    token_storage: hash_only
    fresh_token_ttl_seconds: 60
    stale_menu_access_allowed: true
    fresh_token_single_use: true
    consume_rotates_qr: true
    rules:
    - Fresh QR token plaintext MUST NOT be persisted.
    - Fresh QR token hash MUST be stored in qr_tokens.
    - Fresh QR tokens MUST be single-use for session join.
    - Fresh QR tokens MUST expire after 60 seconds.
    - Consuming a fresh QR token MUST rotate the table QR token.
    - Stale QR MUST allow menu viewing only.
  customer_session_policy:
    initial_ttl_minutes: 10
    extension_duration_minutes: 10
    max_extensions: 3
    max_total_lifetime_minutes: 40
    expires_on_order_submit: true
    customer_identity_required: false
    phone_required: false
    rules:
    - Customer sessions MUST initially expire 10 minutes after fresh QR join.
    - Customer sessions MUST allow at most 3 explicit user-visible extensions.
    - Customer sessions MUST NOT exceed 40 minutes total lifetime.
    - Customer sessions MUST move offline after successful order submission.
    - Customer sessions MUST NOT require customer login or phone number in the initial
      product version.
  order_model:
    one_customer_submit_creates_one_order: true
    one_order_has_many_order_items: true
    station_tickets_created_per_station: true
    station_tickets_grouped_by_station: true
    bill_attachment_required_on_submit: true
    rules:
    - One customer order submit MUST create exactly one order.
    - One order MAY contain items routed to multiple stations.
    - Station tickets MUST be created per station from order items.
    - Station tickets MUST reference the parent order.
    - Customer order submit MUST attach the order to the table's active bill session
      through bill_orders.
    - If no active bill session exists, customer order submit MUST atomically create
      a bill session before bill_orders attachment.
  price_snapshot_policy:
    cart_item_price_snapshot_on_add: true
    order_item_price_snapshot_on_submit: true
    submit_revalidates_current_price: true
    rules:
    - Cart items MUST store the displayed price snapshot captured when the item is
      added to cart.
    - Order items MUST store final submitted price snapshot.
    - Order submit MUST revalidate current menu item price before order creation.
    - If price changed before submit, order submit MUST fail with a cart refresh required
      error.
  tables:
    qr_tokens:
      ownership: tenant_database
      purpose: Stores hashed QR token state for table menu access and fresh customer
        session joins.
      primary_key: id
      columns:
        id: uuid
        table_id: uuid_required_fk_tables
        token_hash: text_required_unique
        token_kind: enum_required
        status: enum_required
        issued_at_utc: timestamptz_required
        expires_at_utc: timestamptz_nullable
        consumed_at_utc: timestamptz_nullable
        replaced_by_token_id: uuid_nullable_fk_qr_tokens
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_token_kinds:
      - stale_menu
      - fresh_session_join
      allowed_statuses:
      - active
      - consumed
      - expired
      - replaced
      - revoked
      unique_constraints:
      - ux_qr_tokens_token_hash
      constraints:
      - fresh_tokens_require_expires_at
      - fresh_tokens_single_use
      - plaintext_token_forbidden
      - token_table_must_be_active_for_session_join
    customer_sessions:
      ownership: tenant_database
      purpose: Stores short-lived customer sessions created by fresh QR join.
      primary_key: id
      columns:
        id: uuid
        table_id: uuid_required_fk_tables
        qr_token_id: uuid_required_fk_qr_tokens
        status: enum_required
        started_at_utc: timestamptz_required
        expires_at_utc: timestamptz_required
        submitted_at_utc: timestamptz_nullable
        expired_at_utc: timestamptz_nullable
        offline_at_utc: timestamptz_nullable
        extension_count: integer_required_default_0
        max_expires_at_utc: timestamptz_required
        last_activity_at_utc: timestamptz_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - submitted
      - expired
      - offline
      indexes:
      - ix_customer_sessions_table_status
      - ix_customer_sessions_expires_at
      constraints:
      - extension_count_not_above_3
      - expires_at_not_after_max_expires_at
      - max_lifetime_not_above_40_minutes
      - submitted_session_must_move_offline
    customer_carts:
      ownership: tenant_database
      purpose: Stores one cart per active customer session.
      primary_key: id
      columns:
        id: uuid
        customer_session_id: uuid_required_fk_customer_sessions
        table_id: uuid_required_fk_tables
        status: enum_required
        locked_at_utc: timestamptz_nullable
        submitted_order_id: uuid_nullable_fk_orders
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - locked
      - submitted
      - abandoned
      unique_constraints:
      - ux_customer_carts_one_active_cart_per_session
      constraints:
      - one_active_cart_per_active_session
      - cart_locked_on_order_submit
    customer_cart_items:
      ownership: tenant_database
      purpose: Stores customer cart item rows and price snapshots captured when added.
      primary_key: id
      columns:
        id: uuid
        cart_id: uuid_required_fk_customer_carts
        menu_item_id: uuid_required_fk_menu_items
        quantity: integer_required
        item_name_snapshot: text_required
        unit_price_amount_snapshot: numeric_required
        unit_price_currency_snapshot: char3_required_default_TRY
        station_id_snapshot: uuid_required_fk_stations
        note: text_nullable
        status: enum_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - removed
      - submitted
      constraints:
      - quantity_must_be_positive
      - cart_item_price_snapshot_required
      - cart_item_station_snapshot_required
    orders:
      ownership: tenant_database
      purpose: Stores submitted customer orders created from active customer sessions.
      primary_key: id
      columns:
        id: uuid
        order_number: text_required_unique
        table_id: uuid_required_fk_tables
        customer_session_id: uuid_required_fk_customer_sessions
        cart_id: uuid_required_fk_customer_carts
        status: enum_required
        source: enum_required_default_customer_session
        submitted_at_utc: timestamptz_required
        total_amount: numeric_required
        currency: char3_required_default_TRY
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - submitted
      - accepted
      - partially_ready
      - ready
      - served
      - cancelled
      allowed_sources:
      - customer_session
      - staff_pda
      unique_constraints:
      - ux_orders_order_number
      constraints:
      - one_submit_creates_one_order
      - customer_order_requires_customer_session
      - order_total_matches_order_items
      - order_bill_ownership_is_represented_by_bill_orders
    order_items:
      ownership: tenant_database
      purpose: Stores submitted order item rows with final price and routing snapshots.
      primary_key: id
      columns:
        id: uuid
        order_id: uuid_required_fk_orders
        menu_item_id: uuid_required_fk_menu_items
        quantity: integer_required
        item_name_snapshot: text_required
        unit_price_amount_snapshot: numeric_required
        unit_price_currency_snapshot: char3_required_default_TRY
        station_id_snapshot: uuid_required_fk_stations
        note: text_nullable
        status: enum_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - submitted
      - accepted
      - preparing
      - ready
      - served
      - cancelled
      constraints:
      - quantity_must_be_positive
      - order_item_price_snapshot_required
      - order_item_station_snapshot_required
    station_tickets:
      ownership: tenant_database
      purpose: Stores station-specific work tickets created from submitted order items.
      primary_key: id
      columns:
        id: uuid
        order_id: uuid_required_fk_orders
        station_id: uuid_required_fk_stations
        status: enum_required
        accepted_at_utc: timestamptz_nullable
        preparing_at_utc: timestamptz_nullable
        ready_at_utc: timestamptz_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - submitted
      - accepted
      - preparing
      - ready
      - cancelled
      unique_constraints:
      - ux_station_tickets_order_station
      constraints:
      - one_station_ticket_per_order_station
      - station_ticket_requires_active_station_at_creation
    station_ticket_items:
      ownership: tenant_database
      purpose: Maps submitted order items to station tickets.
      primary_key: id
      columns:
        id: uuid
        station_ticket_id: uuid_required_fk_station_tickets
        order_item_id: uuid_required_fk_order_items
        quantity: integer_required
        status: enum_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - submitted
      - accepted
      - preparing
      - ready
      - cancelled
      unique_constraints:
      - ux_station_ticket_items_ticket_order_item
      constraints:
      - station_ticket_item_must_match_ticket_station_snapshot
  submit_transaction_rules:
    atomic_operation: true
    creates:
    - orders
    - order_items
    - station_tickets
    - station_ticket_items
    - bill_sessions_when_no_active_bill_exists
    - bill_orders
    updates:
    - customer_sessions
    - customer_carts
    - customer_cart_items
    - bill_sessions_totals
    rules:
    - Order submit MUST be atomic.
    - Order submit MUST revalidate session active status inside the transaction.
    - Order submit MUST revalidate current price and station routing inside the transaction.
    - Order submit MUST lock or mark submitted cart inside the transaction.
    - Order submit MUST move customer session to submitted/offline inside the transaction.
    - Order submit MUST create station tickets grouped by station inside the transaction.
    - Order submit MUST lock active bill lookup for the table inside the transaction.
    - Order submit MUST create a bill_sessions row when no active bill exists for
      the table.
    - Order submit MUST attach the created order to the active or newly-created bill
      through bill_orders.
    - Order submit MUST update bill session totals from server-side order item snapshots.
  bill_session_integration:
    ownership_table: bill_orders
    order_table_bill_session_id_allowed: false
    auto_open_bill_if_none_exists: true
    one_active_bill_per_table_required: true
    rules:
    - orders MUST NOT own bill_session_id in the initial product version.
    - Bill ownership of orders MUST be represented by bill_orders.
    - Customer order submit MUST create bill_orders in the same transaction as orders.
    - Customer order submit MUST create bill_sessions first if no active bill session
      exists for the order table.
    - Customer order submit MUST fail if bill session state prevents attaching a new
      order.
  forbidden_behavior:
  - customer_order_data_in_platform_database
  - qr_token_plaintext_persistence
  - fresh_qr_token_reuse
  - fresh_qr_token_ttl_above_60_seconds_initial_version
  - customer_session_lifetime_above_40_minutes
  - customer_session_extension_count_above_3
  - customer_session_remaining_active_after_order_submit
  - multiple_active_carts_for_one_active_session
  - order_submit_without_price_revalidation
  - order_submit_without_station_routing_revalidation
  - order_submit_without_bill_attachment
  - order_submit_without_bill_total_recalculation
  - order_table_owning_bill_session_id_initial_version
  - one_submit_creating_multiple_orders_initial_version
  - station_ticket_without_parent_order
  - customer_identity_required_initial_version
  - customer_phone_required_initial_version
  open_decisions: []
  done_when:
  - customer_order_data_isolation_is_defined
  - qr_token_policy_is_defined
  - customer_session_policy_is_defined
  - order_model_is_defined
  - price_snapshot_policy_is_defined
  - qr_tokens_table_is_defined
  - customer_sessions_table_is_defined
  - customer_carts_table_is_defined
  - customer_cart_items_table_is_defined
  - orders_table_is_defined
  - order_items_table_is_defined
  - station_tickets_table_is_defined
  - station_ticket_items_table_is_defined
  - submit_transaction_rules_are_defined
  - bill_session_integration_is_defined
  - forbidden_customer_order_data_behavior_is_defined
platform_data:
  purpose:
    rule: Define the platform database contract for platform-owned users, tenant lifecycle
      metadata, tenant domains, tenant database registry, provisioning jobs, schema
      jobs, settings, audit, and idempotency.
    database_name: iotable_platform
    database_engine: PostgreSQL 17
  platform_database_policy:
    id_strategy: uuid
    timestamp_fields:
    - created_at
    - updated_at
    soft_delete: false
    audit_strategy: append_only_platform_audit_log
    tenant_operational_data_allowed: false
    tenant_staff_identity_data_allowed: false
    tenant_owner_activation_invite_storage: tenant_database
    rules:
    - Platform database MUST NOT store tenant operational data.
    - Platform database MUST NOT store tenant staff identity records.
    - Platform database MUST NOT store tenant owner activation invite token hashes.
    - Platform database MUST store platform control-plane data only.
    - Tenant lifecycle MUST be represented by explicit status fields.
    - Audit records MUST be append-only.
    - Mutation idempotency MUST be stored in platform_idempotency_keys.
    - Tenant database identifiers MAY be stored in the platform database.
    - Tenant database secrets MUST NOT be stored as plaintext.
    - Soft delete MUST NOT be used for platform lifecycle records.
  schemas:
    default_schema: public
    rules:
    - Platform tables MUST be created in the platform database.
    - Platform tables MUST NOT be created in tenant databases.
  tables:
  - name: platform_users
    purpose: Store platform owner identity records.
    owner_module: platform_identity_access
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: email
      type: citext
      nullable: false
      unique: true
    - name: display_name
      type: text
      nullable: false
    - name: status
      type: text
      nullable: false
      allowed_values:
      - active
      - disabled
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_platform_users_email
      columns:
      - email
      unique: true
  - name: platform_roles
    purpose: Store platform role definitions.
    owner_module: platform_identity_access
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: code
      type: text
      nullable: false
      unique: true
      allowed_values:
      - platform_owner
    - name: display_name
      type: text
      nullable: false
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_platform_roles_code
      columns:
      - code
      unique: true
  - name: platform_user_roles
    purpose: Assign platform roles to platform users.
    owner_module: platform_identity_access
    columns:
    - name: platform_user_id
      type: uuid
      nullable: false
      references: platform_users.id
    - name: platform_role_id
      type: uuid
      nullable: false
      references: platform_roles.id
    - name: created_at
      type: timestamptz
      nullable: false
    primary_key:
    - platform_user_id
    - platform_role_id
  - name: tenants
    purpose: Store tenant registry and lifecycle status.
    owner_module: platform_tenant_lifecycle
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: display_name
      type: text
      nullable: false
    - name: slug
      type: text
      nullable: false
      unique: true
    - name: status
      type: text
      nullable: false
      allowed_values:
      - draft
      - provisioning
      - active
      - suspended
      - deactivated
      - provisioning_failed
    - name: business_type
      type: text
      nullable: false
      allowed_values:
      - cafe
      - restaurant
      - bar
      - food_court_vendor
      - cloud_kitchen
      - other
    - name: default_locale
      type: text
      nullable: false
    - name: default_currency
      type: text
      nullable: false
    - name: timezone
      type: text
      nullable: false
    - name: notes
      type: text
      nullable: true
    - name: created_by_platform_user_id
      type: uuid
      nullable: false
      references: platform_users.id
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_tenants_slug
      columns:
      - slug
      unique: true
    - name: ix_tenants_status
      columns:
      - status
    rules:
    - Tenant slug MUST be immutable after creation.
    - Tenant lifecycle active MUST NOT imply tenant operations active.
    - Deactivated tenant lifecycle records are terminal in the initial product version.
  - name: tenant_domains
    purpose: Store canonical tenant domain assignment derived from tenant slug.
    owner_module: platform_tenant_lifecycle
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: tenant_id
      type: uuid
      nullable: false
      references: tenants.id
    - name: domain
      type: text
      nullable: false
      unique: true
    - name: is_primary
      type: boolean
      nullable: false
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_tenant_domains_domain
      columns:
      - domain
      unique: true
    - name: ix_tenant_domains_tenant_id
      columns:
      - tenant_id
    rules:
    - Tenant domain MUST follow {tenant}.iotables.net.
    - Custom tenant domains MUST NOT be stored.
  - name: tenant_databases
    purpose: Store tenant database registry metadata.
    owner_module: platform_tenant_lifecycle
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: tenant_id
      type: uuid
      nullable: false
      references: tenants.id
      unique: true
    - name: database_name
      type: text
      nullable: false
      unique: true
    - name: connection_secret_ref
      type: text
      nullable: false
    - name: status
      type: text
      nullable: false
      allowed_values:
      - creating
      - ready
      - failed
      - locked
    - name: current_schema_version
      type: text
      nullable: true
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_tenant_databases_tenant_id
      columns:
      - tenant_id
      unique: true
    - name: ux_tenant_databases_database_name
      columns:
      - database_name
      unique: true
    rules:
    - Tenant database name MUST be system-generated.
    - connection_secret_ref MUST reference external secret storage and MUST NOT contain
      plaintext credentials.
  - name: tenant_provisioning_jobs
    purpose: Store tenant provisioning job records.
    owner_module: platform_provisioning_jobs
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: tenant_id
      type: uuid
      nullable: false
      references: tenants.id
    - name: status
      type: text
      nullable: false
      allowed_values:
      - queued
      - running
      - failed
      - retrying
      - completed
      - manual_intervention_required
    - name: current_step
      type: text
      nullable: true
    - name: failed_step
      type: text
      nullable: true
    - name: failure_code
      type: text
      nullable: true
    - name: failure_message_safe
      type: text
      nullable: true
    - name: partial_resources
      type: jsonb
      nullable: false
    - name: retry_attempt_count
      type: integer
      nullable: false
    - name: started_at
      type: timestamptz
      nullable: true
    - name: completed_at
      type: timestamptz
      nullable: true
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ix_tenant_provisioning_jobs_tenant_id
      columns:
      - tenant_id
    - name: ix_tenant_provisioning_jobs_status
      columns:
      - status
    rules:
    - Provisioning failures MUST track partial resources.
    - Provisioning retry MUST be idempotent and MUST NOT blindly recreate existing
      resources.
  - name: tenant_provisioning_job_steps
    purpose: Store provisioning job step state.
    owner_module: platform_provisioning_jobs
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: job_id
      type: uuid
      nullable: false
      references: tenant_provisioning_jobs.id
    - name: step_code
      type: text
      nullable: false
    - name: status
      type: text
      nullable: false
      allowed_values:
      - pending
      - running
      - completed
      - failed
      - skipped
    - name: started_at
      type: timestamptz
      nullable: true
    - name: completed_at
      type: timestamptz
      nullable: true
    - name: failure_message_safe
      type: text
      nullable: true
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_tenant_provisioning_job_steps_job_step
      columns:
      - job_id
      - step_code
      unique: true
  - name: tenant_schema_change_jobs
    purpose: Store tenant schema change job records.
    owner_module: platform_database_schema_orchestration
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: target_schema_version
      type: text
      nullable: false
    - name: mode
      type: text
      nullable: false
      allowed_values:
      - check
      - apply_latest
    - name: status
      type: text
      nullable: false
      allowed_values:
      - queued
      - running
      - failed
      - completed
    - name: created_by_platform_user_id
      type: uuid
      nullable: true
      references: platform_users.id
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ix_tenant_schema_change_jobs_status
      columns:
      - status
  - name: tenant_schema_change_job_runs
    purpose: Store per-tenant schema job execution result.
    owner_module: platform_database_schema_orchestration
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: job_id
      type: uuid
      nullable: false
      references: tenant_schema_change_jobs.id
    - name: tenant_id
      type: uuid
      nullable: false
      references: tenants.id
    - name: from_schema_version
      type: text
      nullable: true
    - name: to_schema_version
      type: text
      nullable: true
    - name: status
      type: text
      nullable: false
      allowed_values:
      - queued
      - running
      - failed
      - completed
      - skipped
    - name: failure_message_safe
      type: text
      nullable: true
    - name: started_at
      type: timestamptz
      nullable: true
    - name: completed_at
      type: timestamptz
      nullable: true
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ux_tenant_schema_change_job_runs_job_tenant
      columns:
      - job_id
      - tenant_id
      unique: true
    - name: ix_tenant_schema_change_job_runs_tenant_id
      columns:
      - tenant_id
    - name: ix_tenant_schema_change_job_runs_status
      columns:
      - status
  - name: tenant_schema_versions
    purpose: Store latest known schema version for each tenant database.
    owner_module: platform_database_schema_orchestration
    columns:
    - name: tenant_id
      type: uuid
      nullable: false
      primary_key: true
      references: tenants.id
    - name: schema_version
      type: text
      nullable: false
    - name: checked_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
  - name: platform_settings
    purpose: Store editable platform settings.
    owner_module: platform_settings
    columns:
    - name: setting_id
      type: text
      nullable: false
      primary_key: true
    - name: value
      type: jsonb
      nullable: false
    - name: updated_by_platform_user_id
      type: uuid
      nullable: true
      references: platform_users.id
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
  - name: platform_audit_log
    purpose: Store append-only platform audit records.
    owner_module: platform_audit
    append_only: true
    columns:
    - name: id
      type: uuid
      nullable: false
      primary_key: true
    - name: event_type
      type: text
      nullable: false
    - name: actor_type
      type: text
      nullable: false
      allowed_values:
      - platform_owner
      - system
    - name: actor_id
      type: uuid
      nullable: true
      references: platform_users.id
    - name: tenant_id
      type: uuid
      nullable: true
      references: tenants.id
    - name: job_id
      type: uuid
      nullable: true
    - name: severity
      type: text
      nullable: false
      allowed_values:
      - info
      - warning
      - critical
    - name: reason
      type: text
      nullable: true
    - name: metadata
      type: jsonb
      nullable: false
    - name: created_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ix_platform_audit_log_event_type
      columns:
      - event_type
    - name: ix_platform_audit_log_severity
      columns:
      - severity
    - name: ix_platform_audit_log_tenant_id
      columns:
      - tenant_id
    - name: ix_platform_audit_log_job_id
      columns:
      - job_id
    - name: ix_platform_audit_log_created_at
      columns:
      - created_at
  - name: platform_idempotency_keys
    purpose: Store idempotency records for platform mutation requests.
    owner_module: platform_api
    columns:
    - name: idempotency_key
      type: text
      nullable: false
      primary_key: true
    - name: request_hash
      type: text
      nullable: false
    - name: response_status
      type: integer
      nullable: true
    - name: response_body
      type: jsonb
      nullable: true
    - name: status
      type: text
      nullable: false
      allowed_values:
      - processing
      - completed
      - failed
    - name: expires_at
      type: timestamptz
      nullable: false
    - name: created_at
      type: timestamptz
      nullable: false
    - name: updated_at
      type: timestamptz
      nullable: false
    indexes:
    - name: ix_platform_idempotency_keys_expires_at
      columns:
      - expires_at
  forbidden_tables:
  - tenant_owner_activation_invites
  - restaurant_menus
  - restaurant_tables
  - restaurant_orders
  - guest_sessions
  - kitchen_station_workflows
  - checkout_records
  - tenant_staff_operational_records
  - tenant_users
  - tenant_user_roles
  - staff_invites
  constraint_rules:
  - id: PDC-001
    rule: Tenant slug MUST be globally unique and immutable after creation.
  - id: PDC-002
    rule: Tenant domain MUST be globally unique and follow {tenant}.iotables.net.
  - id: PDC-003
    rule: Tenant database name MUST be globally unique.
  - id: PDC-004
    rule: Platform audit log MUST be append-only.
  - id: PDC-005
    rule: platform_idempotency_keys MUST prevent duplicate execution of mutation requests
      with the same idempotency key.
  - id: PDC-006
    rule: connection_secret_ref MUST reference external secret storage and MUST NOT
      contain plaintext credentials.
  - id: PDC-007
    rule: Tenant lifecycle active MUST NOT imply tenant operations active.
  - id: PDC-008
    rule: Tenant owner activation invite records MUST be stored in the tenant database,
      not the platform database.
  open_decisions: []
  done_when:
  - platform_database_policy_is_defined
  - platform_identity_tables_are_defined
  - tenant_lifecycle_tables_are_defined
  - tenant_provisioning_tables_are_defined
  - tenant_schema_job_tables_are_defined
  - platform_settings_table_is_defined
  - platform_audit_table_is_defined
  - platform_idempotency_table_is_defined
  - forbidden_platform_tables_are_defined
  - platform_data_constraint_rules_are_defined
tenant_setup_data:
  purpose:
    rule: Define tenant setup database ownership, tenant database isolation, setup
      entities, tenant owner activation invites, tenant staff identity tables, table/station/menu/device/staff
      invite data contracts, tenant asset records, and forbidden cross-tenant data
      behavior.
    applies_to:
    - tenant_database
    - tenant_setup_console
    - tenant_owner_activation
    - tenant_staff_identity
    - tenant_initial_configuration
    - tenant_operations_activation
    - tenant_data_isolation
    - table_device_firmware_generation
  isolation_principle:
    model: database_per_tenant
    rule: All tenant operational, setup, owner activation, and staff identity data
      MUST be stored only in the assigned tenant database.
    platform_database_name: iotable_platform
    tenant_database_pattern: iotable_tenant_{tenantSlug}
    tenant_id_filter_based_isolation_allowed: false
    shared_tenant_database_allowed: false
    cross_tenant_query_allowed: false
    cross_tenant_transaction_allowed: false
    rules:
    - Each tenant MUST have a dedicated PostgreSQL database.
    - Tenant isolation MUST be enforced by database boundary, not by tenant_id filtering
      inside shared tenant tables.
    - Tenant operational data MUST NOT be stored in the platform database.
    - Tenant owner activation invite records MUST NOT be stored in the platform database.
    - Tenant staff identity data MUST NOT be stored in the platform database.
    - A tenant runtime context MUST resolve exactly one tenant database connection.
    - A request resolved for one tenant MUST NOT query or mutate another tenant database.
    - Cross-tenant transactions are forbidden.
    - Cross-tenant reporting MUST NOT be implemented by querying tenant operational
      tables from the platform runtime in the initial product version.
  platform_database_boundary:
    owns:
    - tenant_registry
    - tenant_domain_registry
    - tenant_database_registry
    - tenant_provisioning_jobs
    - tenant_schema_change_jobs
    - platform_users
    - platform_roles
    - platform_audit_log
    - global_settings
    does_not_own:
    - tenant_profile
    - tenant_setup_state
    - tenant_owner_activation_invites
    - tenant_users
    - tenant_user_roles
    - tables
    - stations
    - menu_categories
    - menu_items
    - tenant_assets
    - table_devices
    - staff_invites
    - orders
    - carts
    - bill_sessions
    - customer_sessions
    - device_secret_hashes
    - firmware_generation_state
    rules:
    - Platform database MAY store tenant lifecycle metadata and tenant database registry
      data.
    - Platform database MUST NOT store tenant setup or tenant operational entities.
    - Platform database MUST NOT store tenant owner activation invite records.
    - Platform database MUST NOT store tenant staff identity records.
    - Platform database MUST NOT store tenant image asset records.
    - Platform database MUST NOT store ESP32 device secrets or firmware configuration.
  tenant_database_boundary:
    owns:
    - tenant_profile
    - tenant_setup_state
    - tenant_owner_activation_invites
    - tenant_users
    - tenant_user_roles
    - tables
    - stations
    - menu_categories
    - menu_items
    - tenant_assets
    - table_devices
    - staff_invites
    operational_data_owners:
    - customer_sessions
    - carts
    - orders
    - station_tickets
    - bill_sessions
    - manual_payments
    tenant_id_column_policy:
      tenant_id_column_required: false
      tenant_id_column_for_isolation: forbidden
      rationale: Tenant database identity is already determined by the resolved database
        connection.
    rules:
    - Tenant setup and identity tables MUST be created inside the tenant database.
    - Tenant setup and identity tables SHOULD NOT include tenant_id for isolation.
    - Tenant setup and identity tables MUST rely on tenant database boundary for tenant
      isolation.
    - Tenant database schema version MUST be tracked per tenant database.
  common_columns:
    required_for_mutable_tables:
    - id
    - created_at_utc
    - updated_at_utc
    optional_for_auditable_tables:
    - created_by_user_id
    - updated_by_user_id
    id_policy:
      type: uuid
      generated_by: application_or_database
    time_policy:
      timezone: utc
      rules:
      - Mutable tenant setup tables MUST include created_at_utc and updated_at_utc.
      - Timestamp fields MUST be stored in UTC.
  tables:
    tenant_profile:
      ownership: tenant_database
      purpose: Stores tenant business profile and operating defaults.
      primary_key: id
      cardinality: one_row_per_tenant_database
      columns:
        id: uuid
        business_display_name: text_required
        business_type: enum_required
        default_currency: char3_required_default_TRY
        default_timezone: text_required_default_Europe_Istanbul
        business_legal_name: text_nullable
        phone: text_nullable
        address: text_nullable
        logo_asset_id: uuid_nullable_fk_tenant_assets
        default_service_mode: enum_required_default_dine_in
        default_tax_display_mode: enum_required_default_tax_included
        opening_hours_json: jsonb_nullable
        service_charge_json: jsonb_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      constraints:
      - single_row_guard
      - business_type_allowed_values
      - default_service_mode_dine_in_only_initial_version
      - default_tax_display_mode_allowed_values
    tenant_setup_state:
      ownership: tenant_database
      purpose: Stores setup wizard progress and operations activation state.
      primary_key: id
      cardinality: one_row_per_tenant_database
      columns:
        id: uuid
        setup_status: enum_required
        completed_steps_json: jsonb_required_default_empty_array
        activation_status: enum_required
        activated_at_utc: timestamptz_nullable
        activated_by_user_id: uuid_nullable_fk_tenant_users
        last_completed_step: text_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_setup_statuses:
      - not_started
      - in_progress
      - completed
      allowed_activation_statuses:
      - not_active
      - active
      constraints:
      - single_row_guard
    tenant_owner_activation_invites:
      ownership: tenant_database
      purpose: Stores tenant owner activation invite created during platform provisioning.
      primary_key: id
      columns:
        id: uuid
        owner_full_name: text_required
        owner_email: citext_required
        normalized_owner_email: citext_required
        owner_phone: text_nullable
        invite_token_hash: text_required_unique
        status: enum_required
        expires_at_utc: timestamptz_required
        accepted_at_utc: timestamptz_nullable
        accepted_user_id: uuid_nullable_fk_tenant_users
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - pending
      - accepted
      - expired
      - revoked
      ttl_hours: 168
      role_assigned_on_acceptance: tenant_owner
      constraints:
      - created_only_by_platform_provisioning_flow
      - tenant_owner_activation_token_hash_required
      - tenant_owner_activation_token_plaintext_forbidden
      - tenant_owner_activation_invite_expires_after_168_hours
      - accepted_invite_creates_tenant_owner_user
      - accepted_invite_links_to_tenant_user
      - accepted_invite_not_reusable
      rules:
      - Tenant owner activation invite MUST be created during tenant provisioning.
      - Tenant owner activation invite MUST be stored in the tenant database.
      - Tenant owner activation invite MUST NOT be stored in the platform database.
      - Tenant owner activation invite MUST assign tenant_owner role on acceptance.
      - Tenant owner activation invite MUST NOT be created by tenant staff invite
        API.
    tenant_users:
      ownership: tenant_database
      purpose: Stores tenant-scoped staff user identity records.
      primary_key: id
      columns:
        id: uuid
        display_name: text_required
        email: citext_required
        normalized_email: citext_required
        password_hash: text_required
        status: enum_required
        two_factor_enabled: boolean_required_default_false
        email_confirmed: boolean_required_default_true_after_invite_activation
        activated_at_utc: timestamptz_nullable
        disabled_at_utc: timestamptz_nullable
        disabled_by_user_id: uuid_nullable_fk_tenant_users
        last_login_at_utc: timestamptz_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - disabled
      unique_constraints:
      - ux_tenant_users_active_normalized_email
      constraints:
      - duplicate_active_email_within_tenant_forbidden
      - same_email_across_different_tenant_databases_allowed
      - password_hash_required
      - plaintext_password_forbidden
      - hard_delete_forbidden_initial_version
    tenant_user_roles:
      ownership: tenant_database
      purpose: Stores fixed tenant role assignments for tenant staff users.
      primary_key: id
      columns:
        id: uuid
        user_id: uuid_required_fk_tenant_users
        role: enum_required
        assigned_by_user_id: uuid_nullable_fk_tenant_users
        assigned_at_utc: timestamptz_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_roles:
      - tenant_owner
      - tenant_admin
      - tenant_manager
      - cashier
      - floor_staff
      - station_operator
      - accountant
      unique_constraints:
      - ux_tenant_user_roles_user_role
      constraints:
      - roles_must_use_fixed_tenant_role_catalog
      - platform_roles_forbidden
      - tenant_owner_role_not_assignable_from_staff_invite
    tenant_assets:
      ownership: tenant_database
      purpose: Stores tenant-scoped asset metadata for menu item images and optional
        tenant visuals.
      primary_key: id
      columns:
        id: uuid
        asset_type: enum_required
        storage_key: text_required_unique
        original_file_name: text_nullable
        content_type: text_required
        byte_size: integer_required
        width_px: integer_nullable
        height_px: integer_nullable
        status: enum_required
        created_by_user_id: uuid_required_fk_tenant_users
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_asset_types:
      - menu_item_image
      - tenant_logo
      - setup_visual
      allowed_statuses:
      - active
      - deleted
      constraints:
      - tenant_asset_storage_key_unique
      - asset_metadata_only_in_database
      - asset_binary_storage_must_be_tenant_scoped
    tables:
      ownership: tenant_database
      purpose: Stores operational and system test tables.
      primary_key: id
      columns:
        id: uuid
        table_number: text_required
        table_code: text_required
        display_name: text_nullable
        area_or_section: text_nullable
        seat_capacity: integer_nullable
        table_type: enum_required
        status: enum_required
        has_qr_device: boolean_required
        customer_self_ordering_enabled: boolean_required
        staff_pda_ordering_enabled: boolean_required_default_true
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_table_types:
      - operational
      - system_test
      allowed_statuses:
      - active
      - disabled
      unique_constraints:
      - ux_tables_table_number
      - ux_tables_table_code
      seed_rows:
      - table_number: '000'
        table_code: '000'
        table_type: system_test
        has_qr_device: false
        customer_self_ordering_enabled: false
        staff_pda_ordering_enabled: true
      - table_number: '999'
        table_code: '999'
        table_type: system_test
        has_qr_device: false
        customer_self_ordering_enabled: false
        staff_pda_ordering_enabled: true
      constraints:
      - system_test_tables_do_not_count_as_operational_activation_gate
      - table_without_qr_device_customer_self_ordering_false
    stations:
      ownership: tenant_database
      purpose: Stores fulfillment stations.
      primary_key: id
      columns:
        id: uuid
        station_code: text_required
        display_name: text_required
        station_type: enum_required
        status: enum_required
        sort_order: integer_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_station_types:
      - kitchen
      - bar
      - coffee
      - dessert
      - service
      - other
      allowed_statuses:
      - active
      - disabled
      unique_constraints:
      - ux_stations_station_code
      seed_rows:
      - station_code: MAIN
        display_name: Main Station
        station_type: kitchen
        status: active
      constraints:
      - MAIN_station_cannot_be_disabled_without_another_active_station
    menu_categories:
      ownership: tenant_database
      purpose: Stores menu categories.
      primary_key: id
      columns:
        id: uuid
        name: text_required
        description: text_nullable
        sort_order: integer_nullable
        status: enum_required
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - disabled
    menu_items:
      ownership: tenant_database
      purpose: Stores menu items, price, image, orderability, and station routing.
      primary_key: id
      columns:
        id: uuid
        category_id: uuid_required_fk_menu_categories
        name: text_required
        description: text_nullable
        image_asset_id: uuid_required_fk_tenant_assets
        price_amount: numeric_required_when_orderable
        price_currency: char3_required_default_TRY
        station_id: uuid_required_when_orderable_fk_stations
        status: enum_required
        orderable: boolean_required
        non_orderable_badge: enum_nullable
        sort_order: integer_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - active
      - disabled
      allowed_non_orderable_badges:
      - unavailable
      - coming_soon
      constraints:
      - orderable_item_requires_price
      - orderable_item_requires_image
      - orderable_item_requires_active_station
      - disabled_items_hidden_from_customer_menu
      - items_under_disabled_category_hidden_from_customer_menu
    table_devices:
      ownership: tenant_database
      purpose: Stores ESP32 table QR display device identity, secret hash, firmware
        generation state, and table assignment.
      primary_key: id
      columns:
        id: uuid
        table_id: uuid_required_fk_tables
        device_id: uuid_required_unique
        device_secret_hash: text_required
        ws_identity: text_required_unique
        firmware_code_version: text_required
        firmware_config_version: integer_required
        firmware_generated_at_utc: timestamptz_required
        firmware_downloaded_at_utc: timestamptz_nullable
        firmware_downloaded_by_user_id: uuid_nullable_fk_tenant_users
        status: enum_required
        last_seen_at_utc: timestamptz_nullable
        display_status: text_nullable
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_statuses:
      - firmware_generated
      - active
      - offline
      - revoked
      - replaced
      unique_constraints:
      - ux_table_devices_device_id
      - ux_table_devices_ws_identity
      - ux_table_devices_one_active_device_per_table
      constraints:
      - device_secret_hash_required
      - plaintext_device_secret_forbidden
      - one_active_qr_display_device_per_table
      - regeneration_revokes_old_secret
    staff_invites:
      ownership: tenant_database
      purpose: Stores optional tenant staff invitations created during setup or tenant
        administration.
      primary_key: id
      columns:
        id: uuid
        display_name: text_required
        email: citext_required
        normalized_email: citext_required
        phone: text_nullable
        role: enum_required
        station_id: uuid_nullable_fk_stations
        invite_token_hash: text_required
        status: enum_required
        expires_at_utc: timestamptz_required
        accepted_at_utc: timestamptz_nullable
        accepted_user_id: uuid_nullable_fk_tenant_users
        created_by_user_id: uuid_required_fk_tenant_users
        created_at_utc: timestamptz_required
        updated_at_utc: timestamptz_required
      allowed_roles:
      - tenant_admin
      - tenant_manager
      - cashier
      - floor_staff
      - station_operator
      - accountant
      allowed_statuses:
      - pending
      - accepted
      - expired
      - revoked
      constraints:
      - tenant_owner_role_not_invitable_from_staff_setup
      - platform_roles_not_invitable_from_tenant_setup
      - invite_token_hash_required
      - plaintext_invite_token_forbidden
      - accepted_invite_links_to_tenant_user
  activation_gate_queries:
    rules:
    - Activation gate queries MUST run only against the resolved tenant database.
    - Activation gate queries MUST NOT query the platform database for tenant operational
      state.
    - Activation gate queries MUST verify at least one active operational table.
    - Activation gate queries MUST exclude system_test tables from operational table
      count.
    - Activation gate queries MUST verify at least one active station.
    - Activation gate queries MUST verify at least one active menu category.
    - Activation gate queries MUST verify at least one active orderable menu item.
    - Activation gate queries MUST verify every active orderable menu item has price,
      image, and active station routing.
  owner_activation_data_security:
    rules:
    - Tenant owner activation invite MUST be stored in the tenant database.
    - Tenant owner activation invite token MUST be stored hash-only.
    - Tenant owner activation invite token plaintext MUST NOT be persisted or logged.
    - Accepted tenant owner activation invite MUST create an active tenant user with
      tenant_owner role.
    - Tenant owner activation invite MUST be distinct from staff_invites.
  identity_data_security:
    rules:
    - Tenant users MUST be stored in the resolved tenant database.
    - Tenant user roles MUST be stored in the resolved tenant database.
    - The same normalized email MAY exist in different tenant databases.
    - The same tenant database MUST NOT contain duplicate active users with the same
      normalized email.
    - Password plaintext MUST NOT be stored.
    - Tenant staff users MUST NOT be hard-deleted in the initial product version.
  firmware_data_security:
    rules:
    - Firmware artifacts MUST NOT be stored as plaintext downloadable blobs without
      access control.
    - Device secret plaintext MUST be available only during firmware generation response.
    - Device secret plaintext MUST NOT be persisted.
    - Wi-Fi credentials MUST NOT be logged in plaintext.
    - Firmware download events MUST be audited in tenant audit or setup audit records.
  asset_data_security:
    rules:
    - Tenant asset metadata MUST be stored in the tenant database.
    - Tenant asset binary storage MUST be tenant-scoped.
    - Tenant asset records MUST NOT be stored in the platform database.
    - Menu item image_asset_id MUST reference tenant_assets.id in the same tenant
      database.
  forbidden_behavior:
  - shared_tenant_database_with_tenant_id_filter_isolation
  - tenant_operational_data_in_platform_database
  - tenant_owner_activation_invite_in_platform_database
  - tenant_staff_identity_in_platform_database
  - cross_tenant_query
  - cross_tenant_transaction
  - platform_database_storing_menu_items
  - platform_database_storing_orders
  - platform_database_storing_table_devices
  - platform_database_storing_tenant_assets
  - platform_database_storing_tenant_owner_activation_invites
  - platform_database_storing_tenant_users
  - platform_database_storing_tenant_user_roles
  - platform_database_storing_device_secret_hashes
  - tenant_setup_tables_using_tenant_id_as_primary_isolation
  - activation_gate_counting_system_test_tables
  - table_without_qr_device_customer_self_ordering_enabled
  - menu_item_image_asset_outside_resolved_tenant_database
  - duplicate_active_email_within_same_tenant
  - plaintext_owner_activation_token_persistence
  - plaintext_password_persistence
  - plaintext_device_secret_persistence
  - plaintext_invite_token_persistence
  open_decisions: []
  done_when:
  - tenant_database_isolation_principle_is_defined
  - platform_database_boundary_is_defined
  - tenant_database_boundary_is_defined
  - common_columns_are_defined
  - tenant_profile_table_is_defined
  - tenant_setup_state_table_is_defined
  - tenant_owner_activation_invites_table_is_defined
  - tenant_users_table_is_defined
  - tenant_user_roles_table_is_defined
  - tenant_assets_table_is_defined
  - tables_table_is_defined
  - stations_table_is_defined
  - menu_categories_table_is_defined
  - menu_items_table_is_defined
  - table_devices_table_is_defined
  - staff_invites_table_is_defined
  - activation_gate_queries_are_defined
  - owner_activation_data_security_is_defined
  - identity_data_security_is_defined
  - firmware_data_security_is_defined
  - asset_data_security_is_defined
  - forbidden_data_behavior_is_defined
esp32_device_identity:
  purpose:
    rule: Define ESP32 table QR display device identity, table-created device configuration,
      table-specific firmware generation, realtime connection, and security rules.
    applies_to:
    - table_device_endpoint
    - customer_qr_presence
    - tenant_table_qr_display
    - device_realtime
    - tenant_setup_console
    - table_creation
  identity_model:
    device_type: esp32_tft_qr_display
    device_scope: tenant_table
    device_represents: one_physical_table_qr_display
    creation_model: generated_during_table_creation_when_table_has_qr_device
    assignment:
      tenant_id: required
      table_id: required
    cardinality:
      one_device_belongs_to_one_tenant: true
      one_device_assigned_to_one_table: true
      one_table_max_active_qr_display_device: true
    rules:
    - One ESP32 QR display device MUST belong to exactly one tenant.
    - One ESP32 QR display device MUST be assigned to exactly one table.
    - A table MAY have at most one active QR display device.
    - Device identity MUST NOT be shared across tenants.
    - Device identity MUST NOT be shared across tables.
    - When a table is created with has_qr_device=true, the system MUST create a table-specific
      device identity.
    - When a table is created with has_qr_device=false, no ESP32 device identity is
      required.
  table_device_option:
    table_field: has_qr_device
    allowed_values:
    - true
    - false
    has_qr_device_true:
      customer_self_ordering_via_table_qr: true
      staff_pda_ordering: true
      system_generates:
      - device_id
      - device_secret
      - ws_identity
      - table_device_config
      - table_specific_firmware_ino
    has_qr_device_false:
      customer_self_ordering_via_table_qr: false
      staff_pda_ordering: true
      bill_session: true
      station_routing: true
      checkout: true
    rules:
    - Tables MAY be created without an ESP32 QR display device.
    - Tables without an ESP32 QR display device MUST support staff PDA ordering.
    - Tables without an ESP32 QR display device MUST NOT support customer self-ordering
      through table QR.
    - Tables with an ESP32 QR display device MUST still support staff PDA ordering.
    - Staff PDA ordering MUST NOT depend on ESP32 device availability.
  responsibilities:
    allowed:
    - connect_to_backend_realtime_endpoint
    - authenticate_as_device
    - receive_current_server_generated_qr_payload
    - display_qr_payload_on_tft_screen
    - replace_displayed_qr_when_server_sends_new_payload
    - report_basic_device_health
    forbidden:
    - generate_qr_tokens
    - store_customer_session_data
    - store_bill_data
    - store_order_data
    - process_orders
    - process_payments
    - decide_qr_validity
    - rotate_qr_without_server_instruction
    rules:
    - ESP32 devices MUST NOT generate QR tokens.
    - ESP32 devices MUST display only server-generated QR payloads.
    - ESP32 devices MUST NOT store tenant operational data.
    - ESP32 devices MUST NOT process customer orders.
    - Server MUST remain the source of truth for QR state.
  device_authentication:
    model: device_secret
    ws_identity_components:
      device_id: public_stable_identifier
      device_secret: private_authentication_secret
      tenant_id: assigned_tenant
      table_id: assigned_table
    server_secret_storage: hash_only
    device_secret_storage: generated_firmware_secret_config
    secret_rotation_supported: true
    revocation_supported: true
    rules:
    - Device secret MUST be generated by the server.
    - Device secret MUST be stored on the server only as a hash.
    - Device secret MUST be embedded only in the generated table-specific firmware/config
      package.
    - Device secret MUST be revocable from tenant console or authorized backend operation.
    - A revoked device secret MUST be rejected immediately on reconnect and on next
      authenticated message.
    - Device authentication MUST include tenant and table assignment validation.
    - device_id identifies the device; device_secret proves the device.
  firmware_generation:
    model: table_specific_generated_ino
    generated_by: server
    generated_when:
    - table_created_with_has_qr_device_true
    - qr_device_added_to_existing_table
    - firmware_regenerated_for_device_replacement_or_secret_rotation
    artifact_is_secret: true
    download_allowed_roles:
    - tenant_owner
    - tenant_admin
    firmware_contains:
    - tenant_domain
    - tenant_id_or_public_tenant_key
    - table_id
    - device_id
    - device_secret
    - websocket_endpoint
    - wifi_ssid
    - wifi_password
    - firmware_code_version
    firmware_composition:
      firmware_code_template: shared
      table_device_config: per_table
      generated_ino: firmware_code_template_plus_per_table_config
    wifi_credentials_embedded: true
    download_policy:
      downloadable_after_generation: true
      audit_required: true
      plaintext_logging_forbidden: true
    regeneration_policy:
      regeneration_allowed: true
      effect:
      - old_device_secret_revoked
      - new_device_secret_generated
      - new_table_specific_firmware_generated
    rules:
    - Firmware artifacts MUST be treated as secrets.
    - Firmware download MUST be limited to tenant_owner and tenant_admin.
    - Firmware download MUST be audited.
    - Firmware artifacts MUST include table-specific device identity and current configuration.
    - Wi-Fi SSID and Wi-Fi password MAY be embedded in generated firmware for MVP
      operational simplicity.
    - Firmware contents, Wi-Fi credentials, device secret, and pairing material MUST
      NOT be logged in plaintext.
    - Firmware regeneration MUST revoke the old device secret.
    - After firmware regeneration, old flashed devices MUST fail authentication unless
      flashed with the new firmware.
  legacy_pairing_flow:
    status: not_used_in_primary_model
    rule: The primary IoTable device model uses table-specific generated firmware
      instead of runtime pairing code.
    notes:
    - Pairing-code-based provisioning is outside the current product scope.
  realtime_connection:
    protocol: WebSocket
    endpoint: wss://{tenant}.iotables.net/ws/devices/tables/{tableId}
    authentication: device_secret
    tenant_resolution: subdomain
    canonical_table_identifier: tableId
    reconnect_behavior:
      reconnect_allowed: true
      reconnect_rotates_qr_by_itself: false
      server_sends_current_qr_after_successful_reconnect: true
    rules:
    - Device realtime connection MUST use the tenant domain.
    - Device realtime connection MUST use tableId as the canonical table identifier.
    - Device reconnect MUST authenticate using the device secret.
    - Device reconnect MUST NOT rotate QR by itself.
    - After successful reconnect, server MAY send the current valid QR payload or
      a newly generated QR payload according to server QR state rules.
  server_qr_authority:
    qr_generation: server_only
    qr_rotation_interval_seconds: 60
    rotate_after_successful_consume: true
    device_receives_payload_only: true
    rules:
    - Server MUST generate QR tokens.
    - Server MUST decide QR validity.
    - Server MUST rotate the QR after successful fresh QR consume.
    - Server MUST push new QR payload to the assigned active table device when QR
      changes.
    - Device MUST display the latest QR payload received from the server.
  device_lifecycle:
    add_device_after_table_creation: true
    remove_or_disable_device: true
    regenerate_firmware: true
    replace_device: true
    statuses:
    - not_configured
    - firmware_generated
    - active
    - offline
    - revoked
    - replaced
    rules:
    - A QR display device MAY be added to an existing table after table creation.
    - A QR display device MAY be disabled or revoked.
    - Replacing a device MUST revoke the previous device secret.
    - A table MUST NOT have more than one active QR display device.
  health_and_observability:
    reported_health_fields:
    - device_id
    - tenant_id
    - table_id
    - connection_status
    - last_seen_at
    - firmware_version
    - display_status
    rules:
    - Backend MUST track last_seen_at for active devices.
    - Backend MUST expose device status to authorized tenant users.
    - Device health MUST NOT include customer session, bill, or order content.
  security_rules:
  - id: EDI-001
    rule: ESP32 devices MUST NOT generate QR tokens.
  - id: EDI-002
    rule: ESP32 devices MUST display only server-generated QR payloads.
  - id: EDI-003
    rule: Device secret MUST be revocable.
  - id: EDI-004
    rule: A device MUST be assigned to exactly one tenant table.
  - id: EDI-005
    rule: A table MAY have at most one active QR display device.
  - id: EDI-006
    rule: Device reconnect MUST NOT rotate QR by itself.
  - id: EDI-007
    rule: Server MUST remain source of truth for QR state.
  - id: EDI-008
    rule: Device messages MUST be tenant-scoped and table-scoped.
  - id: EDI-009
    rule: Revoked devices MUST NOT receive QR payloads.
  - id: EDI-010
    rule: Firmware artifacts, Wi-Fi credentials, and device secrets MUST NOT be logged
      in plaintext.
  - id: EDI-011
    rule: Firmware artifacts MUST be treated as tenant secrets.
  forbidden_behavior:
  - device_generated_qr_token
  - device_side_qr_validity_decision
  - device_storing_customer_session_data
  - device_storing_bill_data
  - device_storing_order_data
  - plaintext_device_secret_server_storage
  - plaintext_firmware_secret_logging
  - plaintext_wifi_credential_logging
  - firmware_download_by_unauthorized_role
  - firmware_regeneration_without_old_secret_revocation
  - one_device_assigned_to_multiple_tables
  - one_device_assigned_to_multiple_tenants
  - multiple_active_qr_display_devices_for_one_table
  - revoked_device_receiving_qr_payload
  - table_without_qr_device_accepting_customer_self_ordering_via_table_qr
  open_decisions: []
  done_when:
  - device_identity_model_is_defined
  - table_device_option_is_defined
  - device_responsibilities_are_defined
  - device_authentication_is_defined
  - firmware_generation_is_defined
  - realtime_connection_contract_is_defined
  - server_qr_authority_is_defined
  - device_lifecycle_is_defined
  - health_and_observability_are_defined
  - device_security_rules_are_defined
  - forbidden_device_behavior_is_defined

websocket_device_protocol:
  purpose:
    rule: Define the WebSocket connection lifecycle, dynamic JSON payload framing, and keep-alive rules for ESP32 table display devices.
    applies_to:
    - esp32_firmware
    - device_realtime_endpoint
    - table_device_qr_display
  protocol_specification:
    transport: WebSocket (RFC 6455)
    connection_url: wss://{tenant}.iotables.net/ws/devices/tables/{tableId}
    message_encoding: JSON
    keep_alive:
      heartbeat_interval_seconds: 60
      heartbeat_initiator: device
      disconnect_threshold_seconds: 120
      heartbeat_packet:
        event: heartbeat
        payload: {}
    reconnection:
      max_retry_backoff_seconds: 300
      backoff_algorithm: exponential_with_jitter
  message_schemas:
    event_frame:
      required_fields:
      - event
      - payload
      types:
        event: string
        payload: json_object
    events:
      heartbeat:
        direction: device_to_server
        description: Keep-alive frame sent by the device to maintain active NAT translation over customer routers.
        event: heartbeat
        payload: {}
      qr_update:
        direction: server_to_device
        description: Command payload notifying the table display device to rotate or display a new customer Ordering QR code.
        event: qr_update
        payload:
          required_fields:
          - url
          - expires_at
          types:
            url: string_uri
            expires_at: integer_timestamp
  rules:
  - id: WDP-001
    rule: All WebSocket communication between ESP32 and the backend MUST use the unified JSON event frame format containing exact 'event' and 'payload' keys.
  - id: WDP-002
    rule: ESP32 devices MUST send a 'heartbeat' event frame every 60 seconds.
  - id: WDP-003
    rule: The backend MUST disconnect the WebSocket if no frame is received within 120 seconds.
  - id: WDP-004
    rule: The backend MUST send 'qr_update' frames when a customer session begins or rotates, containing a valid target URL and epoch expiration timestamp.
  - id: WDP-005
    rule: ESP32 firmware MUST implement an exponential backoff reconnection algorithm with random jitter up to a maximum of 300 seconds when disconnected.
  forbidden_behavior:
  - raw_text_or_csv_frames
  - heartbeat_initiated_by_server_only
  - infinite_reconnection_retries_without_backoff
  - device_rotating_qr_expiration_locally_without_server_command
  open_decisions: []
  done_when:
  - websocket_transport_and_url_are_defined
  - json_payload_framing_is_defined
  - keep_alive_heartbeat_is_defined
  - reconnect_backoff_is_defined
  - qr_update_message_schema_is_defined

database_migration_rules:
  purpose:
    rule: Define database engine requirements, strict schema migration conventions, and rolling deployment safety rules to guarantee zero-downtime upgrades.
    applies_to:
    - platform_database
    - tenant_databases
    - db_migrations
    - platform_schema_orchestration
  migration_specification:
    database_engine: PostgreSQL 17
    tooling: Alembic
    file_naming_convention: V{Version}__{Description}.sql
    version_ordering: sequential
    transactional_migrations:
      default: required
      exceptions:
      - CREATE_INDEX_CONCURRENTLY
  rolling_deployment_policy:
    policy: Expand-Contract pattern
    rules:
    - Destructive schema changes (e.g. dropping columns or tables, renaming columns) MUST NOT occur in a single deployment.
    - "Dropping a column MUST be split into three distinct releases: (1) Expand: add new column, keep writing to both, (2) Migrate: backfill data, transition reads to new column, stop writing to old column, (3) Contract: drop old column."
    - Adding NOT NULL constraints to existing columns MUST include a default value or backfill step in the same migration transaction.
    - Foreign key constraints MUST be created as NOT VALID first and subsequently validated in a separate safe phase.
  rules:
  - id: DMR-001
    rule: Platform and tenant databases MUST target PostgreSQL 17 exclusively.
  - id: DMR-002
    rule: Schema migrations MUST be sequential, using Alembic with strict file naming V{Version}__{Description}.sql.
  - id: DMR-003
    rule: All migrations MUST execute within an explicit database transaction unless they include commands like CREATE INDEX CONCURRENTLY which PostgreSQL prohibits inside transactions.
  - id: DMR-004
    rule: Schema upgrades MUST strictly follow the Expand-Contract pattern to ensure database compatibility with both currently running and next-deploying API code versions.
  - id: DMR-005
    rule: "Naming of indexes, foreign keys, and unique constraints MUST follow deterministic naming schemas: 'idx_{table}_{column}', 'fk_{table}_{referenced_table}', and 'uq_{table}_{column}'."
  forbidden_behavior:
  - direct_column_drop_without_contract_phase
  - non_transactional_migration_by_default
  - out_of_order_migration_merging_without_conflict_resolution
  - raw_ddl_run_without_alembic_tracking
  - add_not_null_without_default_or_backfill
  open_decisions: []
  done_when:
  - database_engine_is_defined
  - migration_tooling_is_defined
  - file_naming_convention_is_defined
  - transaction_safety_rules_are_defined
  - rolling_deployment_policy_is_defined
