    reason: IoTable does not collect payments in any version.
  - id: external_pos_device
    status: phase_2
    initial_version_status: excluded
    reason: Physical ÖKC/POS device integration is a phase_2 feature. Not implemented
      in initial_version.
    canonical_spec: specs/01_product_baseline.yaml#phase_2_advanced_integrations.okc_terminal_sync
  - id: external_fiscal_device
    status: phase_2
    initial_version_status: excluded
    reason: Fiscal device integration (GİB e-Adisyon) is a phase_2 feature. Not
      implemented in initial_version.
    canonical_spec: specs/01_product_baseline.yaml#phase_2_advanced_integrations.e_adisyon_regulatory
  - id: external_e_invoice_or_archive
    status: excluded
    reason: IoTable does not generate standard e-invoice or e-archive documents in
      any version. GİB e-Adisyon (restaurant-specific) is a distinct phase_2 feature.
  - id: online_order_aggregators
    status: phase_2
    initial_version_status: excluded
    reason: Delivery aggregator webhook integration is a phase_2 feature.
    canonical_spec: specs/01_product_baseline.yaml#phase_2_advanced_integrations.online_order_aggregators
